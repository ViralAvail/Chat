<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Direct Messages</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(75, 85, 99, 0.5); }
    
    /* Wallpapers */
    .bg-paper-doodle { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
    .bg-paper-grid { background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0V0zm20 20h20v20H20V20zM0 20h20v20H0V20z' fill='%239C92AC' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E"); }
    .bg-paper-stars { background-image: url("data:image/svg+xml,%3Csvg width='52' height='26' viewBox='0 0 52 26' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.1'%3E%3Cpath d='M10 10c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6h2c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4v2c-3.314 0-6-2.686-6-6 0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6zm25.464-1.95l8.486 8.486-1.414 1.414-8.486-8.486 1.414-1.414z' /%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
    
    /* Animations */
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
      20% { opacity: 1; transform: translateY(-10vh) scale(1.2) rotate(-10deg); }
      100% { transform: translateY(-80vh) scale(1.5) rotate(20deg); opacity: 0; }
    }
    .animate-float {
      animation: floatUp ease-in forwards;
      position: absolute;
      bottom: 0;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 transition-colors duration-300 antialiased text-gray-900 dark:text-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // CONFIGURATION & CONSTANTS
    // ==========================================
    const WEBHOOKS = {
      Daksh: "https://discord.com/api/webhooks/1484129273173381130/Nl0nlQlzK9HlU_t1jgW_tyqvQYIWmC2l-1fOmUfIAQxOK4c4DpZhCZQIxg4qp-PHe5fN",
      Brahmgeet: "https://discord.com/api/webhooks/1484129276109262909/oIAQEcDMz1ahh4mfT5oaIzbchnXKlpLgoWcJGQ7L-3zLSayINLWVQfKWRApxn4dXh8Wz"
    };

    const COMMON_EMOJIS = [
      "😂", "❤️", "😍", "😭", "😊", "🥺", "💀", "🔥", "🥰", "✨", "👍", "🙏", "👀", "💯", "💕", "🤭",
      "🤣", "😘", "😜", "😎", "🤩", "🥳", "😏", "🙄", "😴", "🤯", "🥶", "🤬", "😈", "👻", "👽", "🤖",
      "💩", "🐵", "🐶", "🐱", "🐼", "🐷", "🐸", "🦋", "🌹", "🌻", "🍻", "🥂", "🍕", "🍔", "🍟", "🍩",
      "🎂", "🎈", "🎉", "🎁", "⚽", "🏀", "🎮", "🕹️", "📱", "💻", "📸", "💡", "🚀", "🛸", "🌙", "⭐"
    ];
    const QUICK_REACTIONS = ["❤️", "😂", "😮", "😢", "🙏"];

    const CHAT_COLORS = [
      { name: 'Blue', class: 'bg-blue-500', value: 'blue' },
      { name: 'Purple', class: 'bg-purple-500', value: 'purple' },
      { name: 'Pink', class: 'bg-pink-500', value: 'pink' },
      { name: 'Rose', class: 'bg-rose-500', value: 'rose' },
      { name: 'Green', class: 'bg-emerald-500', value: 'emerald' },
      { name: 'Dark', class: 'bg-gray-800', value: 'gray' },
    ];

    const WALLPAPERS = [
      { name: 'Default', class: '' },
      { name: 'Grid', class: 'bg-paper-grid' },
      { name: 'Doodle', class: 'bg-paper-doodle' },
      { name: 'Stars', class: 'bg-paper-stars' }
    ];

    const GIF_LIBRARY = [
      { url: "https://media.giphy.com/media/10JhviFuU2gWD6/giphy.gif", tags: ["laugh", "haha", "lol"] },
      { url: "https://media.giphy.com/media/xT0xeCCVGGqA5x31q8/giphy.gif", tags: ["love", "heart"] },
      { url: "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif", tags: ["cry", "sad"] },
      { url: "https://media.giphy.com/media/5VKbvrjvwQjnFODgM/giphy.gif", tags: ["wow", "shock"] },
      { url: "https://media.giphy.com/media/3M4NpbLCTxBqU/giphy.gif", tags: ["hug", "cuddle"] },
      { url: "https://media.giphy.com/media/blSTtZehjAZ8I/giphy.gif", tags: ["dance", "party"] }
    ];

    // ==========================================
    // UTILITY FUNCTIONS
    // ==========================================
    const formatTime = (dateString) => new Date(dateString).toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit' });
    const isSameDay = (d1, d2) => {
      const date1 = new Date(d1), date2 = new Date(d2);
      return date1.getFullYear() === date2.getFullYear() && date1.getMonth() === date2.getMonth() && date1.getDate() === date2.getDate();
    };
    const getDateLabel = (dateString) => {
      const date = new Date(dateString), today = new Date(), yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      if (isSameDay(date, today)) return "Today";
      if (isSameDay(date, yesterday)) return "Yesterday";
      return date.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('chat_identity') || null);
      const [messages, setMessages] = useState([]);
      const [inputText, setInputText] = useState("");
      
      // UI Modals & Popups
      const [showEmojis, setShowEmojis] = useState(false);
      const [showGifs, setShowGifs] = useState(false);
      const [gifSearchTerm, setGifSearchTerm] = useState("");
      const [replyingTo, setReplyingTo] = useState(null);
      const [showSettings, setShowSettings] = useState(false);
      const [showProfile, setShowProfile] = useState(false);
      const [activeContextMenu, setActiveContextMenu] = useState(null);
      const [viewingImage, setViewingImage] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [floatingEmojis, setFloatingEmojis] = useState([]);
      
      // Theme & Customization
      const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('chat_theme') === 'dark');
      const [chatColor, setChatColor] = useState(() => localStorage.getItem('chat_color') || 'blue');
      const [wallpaper, setWallpaper] = useState(() => localStorage.getItem('chat_wallpaper') || '');
      const [nickname, setNickname] = useState(() => localStorage.getItem('chat_nickname') || '');

      // Tenor Data
      const [tenorGifs, setTenorGifs] = useState([]);
      const [isSearchingGifs, setIsSearchingGifs] = useState(false);
      const [isRecording, setIsRecording] = useState(false);

      const messagesEndRef = useRef(null);
      const fileInputRef = useRef(null);
      const chatContainerRef = useRef(null);

      // Trigger Floating Emoji Animation
      const triggerBurst = (emoji) => {
        const newEmojis = Array.from({ length: 12 }).map((_, i) => ({
          id: Date.now() + i + Math.random(),
          emoji: emoji,
          left: 20 + Math.random() * 60 + '%',
          animationDuration: 1.5 + Math.random() * 1.5 + 's',
          fontSize: 24 + Math.random() * 24 + 'px',
          delay: Math.random() * 0.2 + 's'
        }));
        setFloatingEmojis(prev => [...prev, ...newEmojis]);
        setTimeout(() => {
          setFloatingEmojis(prev => prev.filter(e => !newEmojis.some(n => n.id === e.id)));
        }, 3500);
      };

      // Load & Save Data
      useEffect(() => {
        if (currentUser) {
          const saved = localStorage.getItem(`chat_history_${currentUser}`);
          if (saved) setMessages(JSON.parse(saved));
        }
      }, [currentUser]);

      useEffect(() => {
        if (currentUser) {
          try { localStorage.setItem(`chat_history_${currentUser}`, JSON.stringify(messages)); } 
          catch (e) { console.warn("Storage full"); }
        }
        scrollToBottom();
      }, [messages, currentUser]);

      useEffect(() => {
        localStorage.setItem('chat_theme', isDarkMode ? 'dark' : 'light');
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [isDarkMode]);

      useEffect(() => { localStorage.setItem('chat_color', chatColor); }, [chatColor]);
      useEffect(() => { localStorage.setItem('chat_wallpaper', wallpaper); }, [wallpaper]);
      useEffect(() => { localStorage.setItem('chat_nickname', nickname); }, [nickname]);

      // Massive Tenor Fetcher
      useEffect(() => {
        if (!showGifs) return;
        const fetchGifs = async () => {
          setIsSearchingGifs(true);
          try {
            const query = gifSearchTerm.trim() || 'trending';
            const endpoint = query === 'trending' 
              ? `https://g.tenor.com/v1/trending?key=LIVDSRZULELA&limit=50`
              : `https://g.tenor.com/v1/search?q=${query}&key=LIVDSRZULELA&limit=50`;
              
            const res = await fetch(endpoint);
            if (!res.ok) throw new Error("Tenor limit hit");
            const data = await res.json();
            if (data.results) setTenorGifs(data.results.map(g => g.media[0].gif.url));
          } catch (error) {
            console.warn("Fallback to offline GIF library.");
            const fallback = GIF_LIBRARY.filter(g => g.tags.some(t => t.includes(gifSearchTerm.toLowerCase()))).map(g => g.url);
            setTenorGifs(fallback.length > 0 ? fallback : GIF_LIBRARY.map(g => g.url));
          } finally {
            setIsSearchingGifs(false);
          }
        };

        const timeoutId = setTimeout(fetchGifs, 400);
        return () => clearTimeout(timeoutId);
      }, [gifSearchTerm, showGifs]);

      // Simulated Read Receipts
      useEffect(() => {
        if (!messages.length || !currentUser) return;
        const lastMsgIndex = messages.length - 1;
        const lastMsg = messages[lastMsgIndex];
        
        if (lastMsg.sender === currentUser) {
          if (lastMsg.status === 'sent') {
            const timer = setTimeout(() => {
              setMessages(prev => {
                const newArr = [...prev];
                newArr[lastMsgIndex] = { ...newArr[lastMsgIndex], status: 'delivered' };
                return newArr;
              });
            }, 1500);
            return () => clearTimeout(timer);
          } else if (lastMsg.status === 'delivered') {
            const timer = setTimeout(() => {
              setMessages(prev => {
                const newArr = [...prev];
                newArr[lastMsgIndex] = { ...newArr[lastMsgIndex], status: 'seen' };
                return newArr;
              });
            }, 3000);
            return () => clearTimeout(timer);
          }
        }
      }, [messages, currentUser]);

      // Close popups on click outside
      useEffect(() => {
        const handleClickOutside = (e) => {
          if (!e.target.closest('.context-menu-container') && !e.target.closest('.msg-bubble')) {
            setActiveContextMenu(null);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const scrollToBottom = () => {
        if (chatContainerRef.current) {
          chatContainerRef.current.scrollTo({ top: chatContainerRef.current.scrollHeight, behavior: 'smooth' });
        }
      };

      const selectUser = (name) => {
        setCurrentUser(name);
        localStorage.setItem('chat_identity', name);
      };

      const handleSend = async (e, customText = null, customImageUrl = null, customFile = null, localDisplayImage = null) => {
        if (e) e.preventDefault();
        
        const textToSend = customText !== null ? customText : inputText;
        if (!textToSend.trim() && !customImageUrl && !customFile) return;

        const displayImage = localDisplayImage || customImageUrl;
        const now = new Date().toISOString();

        const newMessage = {
          id: Date.now().toString(),
          text: textToSend,
          image: displayImage,
          sender: currentUser,
          timestamp: now,
          status: 'sent',
          reactions: [],
          replyTo: replyingTo ? { id: replyingTo.id, text: replyingTo.text, sender: replyingTo.sender } : null
        };

        setMessages(prev => [...prev, newMessage]);
        setInputText("");
        setShowEmojis(false);
        setShowGifs(false);
        setReplyingTo(null);
        setActiveContextMenu(null);

        // Emoji Animation Trigger (If heart clicked or message contains mostly emojis)
        if (customText === "❤️") {
          triggerBurst("❤️");
        } else if (textToSend.trim().length > 0 && textToSend.trim().length <= 8) {
          const emojiRegex = /\p{Emoji}/u;
          if (emojiRegex.test(textToSend)) {
            const firstEmoji = Array.from(textToSend).find(char => emojiRegex.test(char)) || "✨";
            triggerBurst(firstEmoji);
          }
        }

        // Discord Webhook Logic
        const webhookUrl = WEBHOOKS[currentUser];
        const payload = {
          username: currentUser,
          avatar_url: currentUser === 'Daksh' 
            ? "https://ui-avatars.com/api/?name=Daksh&background=0D8ABC&color=fff" 
            : "https://ui-avatars.com/api/?name=Brahmgeet&background=F472B6&color=fff",
        };

        let discordContent = textToSend.trim();
        if (replyingTo) {
          const replyQuote = replyingTo.text ? replyingTo.text : (replyingTo.image ? "[Attachment]" : "[Message]");
          discordContent = `> **Replying to ${replyingTo.sender}:** *${replyQuote}*\n\n${discordContent}`;
        }
        if (discordContent) payload.content = discordContent;

        let body;
        let headers = {};

        if (customFile) {
          body = new FormData();
          body.append('payload_json', JSON.stringify(payload));
          body.append('file', customFile);
        } else {
          if (customImageUrl) payload.embeds = [{ image: { url: customImageUrl } }];
          body = JSON.stringify(payload);
          headers = { 'Content-Type': 'application/json' };
        }

        try {
          await fetch(webhookUrl, { method: 'POST', headers, body });
        } catch (error) {
          console.error("Discord error:", error);
          setMessages(prev => prev.map(m => m.id === newMessage.id ? { ...m, status: 'error' } : m));
        }
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => handleSend(null, "", null, file, reader.result);
        reader.readAsDataURL(file);
        e.target.value = '';
      };

      const handleClearChat = () => {
        setConfirmDialog({
          title: "Clear History",
          message: "Are you sure you want to delete all messages on this device?",
          onConfirm: () => {
            setMessages([]);
            localStorage.removeItem(`chat_history_${currentUser}`);
            setShowSettings(false);
            setConfirmDialog(null);
          }
        });
      };

      const handleUnsend = (id) => { setMessages(prev => prev.filter(msg => msg.id !== id)); setActiveContextMenu(null); };
      const handleCopy = (text) => { navigator.clipboard.writeText(text); setActiveContextMenu(null); };
      
      const handleLikeMessage = (msgId) => {
        setMessages(prev => prev.map(m => m.id === msgId ? { ...m, liked: !m.liked } : m));
      };

      const handleAddReaction = (msgId, emoji) => {
        triggerBurst(emoji); // Trigger animation on reaction
        setMessages(prev => prev.map(m => {
          if (m.id === msgId) {
            const newReactions = m.reactions || [];
            if (!newReactions.includes(emoji)) newReactions.push(emoji);
            return { ...m, reactions: newReactions };
          }
          return m;
        }));
        setActiveContextMenu(null);
      };

      const handleReadAloud = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel(); // Prevent queue buildup/overlapping
          const utterance = new SpeechSynthesisUtterance(text);
          window.speechSynthesis.speak(utterance);
        }
        setActiveContextMenu(null);
      };

      const handleVoiceInput = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          setConfirmDialog({
            title: "Not Supported",
            message: "Voice recognition is not supported in your current browser.",
            onConfirm: () => setConfirmDialog(null)
          });
          return;
        }
        
        const recognition = new SpeechRecognition();
        recognition.onstart = () => setIsRecording(true);
        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          setInputText(prev => prev ? prev + " " + transcript : transcript);
        };
        recognition.onend = () => setIsRecording(false);
        recognition.onerror = () => setIsRecording(false);
        recognition.start();
      };

      // ------------------------------------------
      // SCREEN 1: LOGIN (Heart Removed)
      // ------------------------------------------
      if (!currentUser) {
        return (
          <div className={`min-h-[100dvh] flex flex-col items-center justify-center p-4 transition-colors duration-300 ${isDarkMode ? 'bg-gray-950 text-white' : 'bg-gray-50 text-gray-900'}`}>
            <div className={`p-8 rounded-[2rem] shadow-2xl max-w-sm w-full space-y-8 text-center transition-colors duration-300 ${isDarkMode ? 'bg-gray-900 border border-gray-800' : 'bg-white'}`}>
              <div>
                <h1 className="text-3xl font-bold mb-2">Welcome</h1>
                <p className={isDarkMode ? 'text-gray-400' : 'text-gray-500'}>Who is using this device?</p>
              </div>
              <div className="space-y-4">
                <button onClick={() => selectUser('Daksh')} className="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-semibold transition-all shadow-md active:scale-95 text-lg">
                  I am Daksh
                </button>
                <button onClick={() => selectUser('Brahmgeet')} className="w-full py-4 bg-pink-500 hover:bg-pink-600 text-white rounded-2xl font-semibold transition-all shadow-md active:scale-95 text-lg">
                  I am Brahmgeet
                </button>
              </div>
              <button onClick={() => setIsDarkMode(!isDarkMode)} className="mt-6 flex items-center justify-center gap-2 mx-auto text-sm text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
                <i className={`ph-fill ${isDarkMode ? 'ph-sun' : 'ph-moon'} text-lg`}></i>
                Toggle {isDarkMode ? 'Light' : 'Dark'} Mode
              </button>
            </div>
          </div>
        );
      }

      // ------------------------------------------
      // SCREEN 2: MAIN CHAT INTERFACE
      // ------------------------------------------
      const defaultOtherPerson = currentUser === 'Daksh' ? 'Brahmgeet' : 'Daksh';
      const otherPerson = nickname.trim() !== '' ? nickname : defaultOtherPerson;

      // Last seen logic
      const otherPersonMsgs = messages.filter(m => m.sender !== currentUser);
      const lastOtherMsg = otherPersonMsgs.length > 0 ? otherPersonMsgs[otherPersonMsgs.length - 1] : null;
      const getFormattedLastSeen = (timestamp) => {
        const label = getDateLabel(timestamp);
        const time = formatTime(timestamp);
        if (label === "Today" || label === "Yesterday") return `Last seen ${label.toLowerCase()} at ${time} IST`;
        return `Last seen ${label} at ${time} IST`;
      };
      const lastSeenText = lastOtherMsg ? getFormattedLastSeen(lastOtherMsg.timestamp) : 'Active now';

      const handleSignOut = () => {
        setConfirmDialog({
          title: "Sign Out",
          message: "Are you sure you want to sign out? You will need to select your identity again.",
          onConfirm: () => {
            setCurrentUser(null);
            localStorage.removeItem('chat_identity');
            setShowSettings(false);
            setShowProfile(false);
            setConfirmDialog(null);
          }
        });
      };

      const groupedMessages = [];
      let lastDate = null;
      messages.forEach(msg => {
        const msgDate = new Date(msg.timestamp).toDateString();
        if (msgDate !== lastDate) {
          groupedMessages.push({ type: 'date', value: msg.timestamp, id: `date-${msg.id}` });
          lastDate = msgDate;
        }
        groupedMessages.push({ type: 'message', ...msg });
      });

      return (
        <div className={`min-h-[100dvh] flex items-center justify-center sm:p-4 md:p-8 transition-colors duration-300 ${isDarkMode ? 'bg-gray-950 text-white' : 'bg-gray-100 text-gray-900'}`}>
          <div className={`w-full max-w-4xl h-[100dvh] sm:h-[85vh] md:h-[90vh] flex flex-col overflow-hidden relative shadow-2xl transition-all duration-300 sm:rounded-[2.5rem] ${isDarkMode ? 'bg-gray-900 sm:border-gray-800' : 'bg-white sm:border-gray-200'} sm:border`}>
            
            {/* FLOATING EMOJIS OVERLAY */}
            <div className="absolute inset-0 pointer-events-none z-50 overflow-hidden">
              {floatingEmojis.map(item => (
                <div 
                  key={item.id} 
                  className="animate-float"
                  style={{ 
                    left: item.left, 
                    fontSize: item.fontSize, 
                    animationDuration: item.animationDuration,
                    animationDelay: item.delay
                  }}
                >
                  {item.emoji}
                </div>
              ))}
            </div>

            {/* CONFIRM DIALOG MODAL */}
            {confirmDialog && (
              <div className="absolute inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-zoom-in">
                <div className={`w-full max-w-sm p-6 rounded-2xl shadow-xl ${isDarkMode ? 'bg-gray-800 text-white' : 'bg-white text-gray-900'}`}>
                  <h3 className="text-xl font-bold mb-2">{confirmDialog.title}</h3>
                  <p className="text-sm opacity-80 mb-6">{confirmDialog.message}</p>
                  <div className="flex gap-3 justify-end">
                    <button onClick={() => setConfirmDialog(null)} className="px-4 py-2 rounded-xl font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                      {confirmDialog.title === "Not Supported" ? "Okay" : "Cancel"}
                    </button>
                    {confirmDialog.title !== "Not Supported" && (
                      <button onClick={confirmDialog.onConfirm} className="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-xl font-medium transition-colors">
                        Confirm
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* LIGHTBOX */}
            {viewingImage && (
              <div className="absolute inset-0 bg-black/95 z-[100] flex items-center justify-center p-4 animate-zoom-in">
                <button onClick={() => setViewingImage(null)} className="absolute top-6 right-6 p-2 bg-white/10 hover:bg-white/20 rounded-full text-white"><i className="ph ph-x text-2xl"></i></button>
                <img src={viewingImage} className="max-w-full max-h-[90vh] object-contain rounded-lg" />
                <a href={viewingImage} download target="_blank" className="absolute bottom-6 right-6 p-3 bg-white/10 hover:bg-white/20 rounded-full text-white"><i className="ph ph-download-simple text-2xl"></i></a>
              </div>
            )}

            {/* SETTINGS */}
            {showSettings && (
              <div className={`absolute inset-y-0 right-0 w-full sm:w-80 z-50 shadow-2xl flex flex-col transform transition-transform duration-300 ${isDarkMode ? 'bg-gray-900 border-l border-gray-800' : 'bg-white border-l border-gray-100'}`}>
                <div className={`h-16 border-b flex items-center justify-between px-4 shrink-0 ${isDarkMode ? 'border-gray-800' : 'border-gray-100'}`}>
                  <h2 className="font-bold text-lg">Settings</h2>
                  <button onClick={() => setShowSettings(false)} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full"><i className="ph ph-x text-xl"></i></button>
                </div>
                <div className="p-4 space-y-8 overflow-y-auto flex-1 custom-scrollbar">
                  <div>
                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Appearance</h3>
                    <div className={`flex items-center justify-between p-3 rounded-xl mb-3 ${isDarkMode ? 'bg-gray-800' : 'bg-gray-50'}`}>
                      <span className="font-medium">Dark Mode</span>
                      <button onClick={() => setIsDarkMode(!isDarkMode)} className={`w-12 h-6 rounded-full p-1 transition-colors relative ${isDarkMode ? 'bg-blue-500' : 'bg-gray-300'}`}>
                        <div className={`w-4 h-4 bg-white rounded-full transition-transform ${isDarkMode ? 'translate-x-6' : 'translate-x-0'}`} />
                      </button>
                    </div>
                  </div>

                  <div>
                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Customization</h3>
                    <div className="mb-3">
                      <label className="block text-xs font-medium mb-1 text-gray-500">Partner Nickname</label>
                      <input 
                        type="text" 
                        value={nickname} 
                        onChange={(e) => setNickname(e.target.value)} 
                        placeholder={defaultOtherPerson}
                        className={`w-full px-3 py-2 rounded-xl border outline-none focus:border-blue-500 transition-colors ${isDarkMode ? 'bg-gray-800 border-gray-700 text-white' : 'bg-white border-gray-200 text-gray-900'}`}
                      />
                    </div>
                  </div>
                  
                  <div>
                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Chat Color</h3>
                    <div className="grid grid-cols-3 gap-3">
                      {CHAT_COLORS.map(color => (
                        <button key={color.value} onClick={() => setChatColor(color.value)} className={`flex flex-col items-center gap-2 p-2 rounded-xl border-2 transition-all ${chatColor === color.value ? (isDarkMode ? 'border-white' : 'border-gray-900') : 'border-transparent hover:bg-black/5 dark:hover:bg-white/5'}`}>
                          <div className={`w-8 h-8 rounded-full ${color.class} shadow-sm`} />
                          <span className="text-xs font-medium">{color.name}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Wallpaper</h3>
                    <div className="grid grid-cols-2 gap-3">
                      {WALLPAPERS.map(wp => (
                        <button key={wp.name} onClick={() => setWallpaper(wp.class)} className={`h-16 rounded-xl border-2 flex items-center justify-center font-medium transition-all ${wp.class} ${isDarkMode ? 'bg-gray-800' : 'bg-gray-50'} ${wallpaper === wp.class ? 'border-blue-500 text-blue-500' : 'border-transparent hover:opacity-80'}`}>
                          {wp.name}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Account</h3>
                    <div className="space-y-2">
                      <button onClick={handleClearChat} className="w-full flex items-center gap-3 p-3 rounded-xl bg-red-50 dark:bg-red-500/10 text-red-500 hover:bg-red-100 dark:hover:bg-red-500/20 transition-colors font-medium">
                        <i className="ph ph-trash text-xl"></i> Clear History
                      </button>
                      <button onClick={handleSignOut} className="w-full flex items-center gap-3 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors font-medium">
                        <i className="ph ph-sign-out text-xl"></i> Sign Out
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* PROFILE */}
            {showProfile && (
              <div className={`absolute inset-y-0 right-0 w-full sm:w-80 z-40 shadow-2xl flex flex-col transform transition-transform duration-300 ${isDarkMode ? 'bg-gray-900 border-l border-gray-800' : 'bg-white border-l border-gray-100'}`}>
                <div className={`h-16 border-b flex items-center justify-between px-4 shrink-0 ${isDarkMode ? 'border-gray-800' : 'border-gray-100'}`}>
                  <h2 className="font-bold text-lg">Details</h2>
                  <button onClick={() => setShowProfile(false)} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full"><i className="ph ph-x text-xl"></i></button>
                </div>
                <div className="flex flex-col items-center justify-center p-8 border-b border-gray-100 dark:border-gray-800">
                  <div className={`w-28 h-28 rounded-full flex items-center justify-center text-white text-5xl font-bold shadow-xl mb-4 ${otherPerson === 'Brahmgeet' ? 'bg-pink-400' : 'bg-blue-500'}`}>
                    {otherPerson.charAt(0)}
                  </div>
                  <h2 className="text-2xl font-bold">{otherPerson}</h2>
                  <p className="text-sm text-gray-500 mt-1">{lastSeenText}</p>
                </div>
              </div>
            )}

            <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" className="hidden" />

            {/* HEADER */}
            <div className={`h-16 border-b flex items-center justify-between px-4 z-10 shrink-0 ${isDarkMode ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-100'}`}>
              <div className="flex items-center gap-2 sm:gap-3">
                <button onClick={handleSignOut} className="p-2 -ml-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full text-red-500 hover:text-red-600 transition-colors" title="Sign Out"><i className="ph ph-sign-out text-2xl"></i></button>
                <button onClick={() => setShowProfile(true)} className="flex items-center gap-3 text-left hover:opacity-80">
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-inner ${otherPerson === 'Brahmgeet' ? 'bg-pink-400' : 'bg-blue-500'}`}>
                    {otherPerson.charAt(0)}
                  </div>
                  <div className="flex flex-col">
                    <span className="font-bold text-[15px] leading-tight">{otherPerson}</span>
                    <span className="text-[11px] text-gray-500 dark:text-gray-400 font-medium">{lastSeenText}</span>
                  </div>
                </button>
              </div>
              
              <div className="flex items-center gap-1">
                <button onClick={() => setShowProfile(true)} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full hidden sm:block"><i className="ph ph-info text-2xl"></i></button>
                <button onClick={() => setShowSettings(true)} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full"><i className="ph ph-gear text-2xl"></i></button>
              </div>
            </div>

            {/* CHAT AREA */}
            <div ref={chatContainerRef} className={`flex-1 overflow-y-auto p-4 space-y-3 scroll-smooth custom-scrollbar ${wallpaper} ${isDarkMode && !wallpaper ? 'bg-gray-950' : ''} ${!isDarkMode && !wallpaper ? 'bg-white' : ''}`} onClick={() => { setShowEmojis(false); setShowGifs(false); setActiveContextMenu(null); }}>
              <div className="flex flex-col items-center justify-center py-10 text-center space-y-3">
                <div className={`w-24 h-24 rounded-full flex items-center justify-center text-white text-4xl font-bold shadow-lg ${otherPerson === 'Brahmgeet' ? 'bg-pink-400' : 'bg-blue-500'}`}>{otherPerson.charAt(0)}</div>
                <h2 className="text-xl font-bold bg-white/50 dark:bg-black/50 px-3 py-1 rounded-xl backdrop-blur-sm">{otherPerson}</h2>
                <p className="text-sm text-gray-400 bg-gray-100 dark:bg-gray-800 px-4 py-1.5 rounded-full mt-2 backdrop-blur-sm">End-to-end simulated</p>
              </div>

              {groupedMessages.map((item) => {
                if (item.type === 'date') {
                  return (
                    <div key={item.id} className="flex justify-center my-6">
                      <span className="text-xs font-semibold px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 backdrop-blur-sm shadow-sm">{getDateLabel(item.value)}</span>
                    </div>
                  );
                }

                const msg = item;
                const isMe = msg.sender === currentUser;
                const showContext = activeContextMenu === msg.id;
                const isLastByMe = isMe && messages.filter(m => m.sender === currentUser).pop().id === msg.id;
                const bgClass = !isMe ? (isDarkMode ? 'bg-gray-800 text-gray-100' : 'bg-white border border-gray-100 text-gray-900') : `bg-${chatColor}-500 text-white shadow-md border border-transparent`;

                return (
                  <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-1`}>
                    <div className={`flex items-end gap-2 max-w-[85%] sm:max-w-[70%] relative group`}>
                      
                      {/* Context Menu Trigger */}
                      <div className={`opacity-0 group-hover:opacity-100 transition-opacity flex items-center ${isMe ? 'order-1 pr-2' : 'order-2 pl-2'}`}>
                        <button onClick={(e) => { e.stopPropagation(); setActiveContextMenu(showContext ? null : msg.id); }} className="p-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 rounded-full hover:bg-white/50 dark:hover:bg-black/50 backdrop-blur-sm"><i className="ph-fill ph-dots-three-vertical text-lg"></i></button>
                      </div>

                      {/* Context Menu Popup (Now with Quick Reactions) */}
                      {showContext && (
                        <div className={`context-menu-container absolute -top-12 ${isMe ? 'right-0' : 'left-0'} z-30 flex flex-col gap-1 p-1.5 rounded-2xl shadow-xl border animate-zoom-in ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
                          
                          {/* Quick Reactions Bar */}
                          <div className="flex items-center gap-1 p-1 border-b border-gray-100 dark:border-gray-700 pb-2 mb-1">
                            {QUICK_REACTIONS.map(emoji => (
                              <button key={emoji} onClick={() => handleAddReaction(msg.id, emoji)} className="text-xl hover:scale-125 transition-transform px-1">{emoji}</button>
                            ))}
                          </div>

                          {/* Options */}
                          <div className="flex gap-1">
                            <button onClick={() => { setReplyingTo(msg); setActiveContextMenu(null); }} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-blue-500" title="Reply"><i className="ph ph-arrow-u-up-left text-lg"></i></button>
                            {msg.text && <button onClick={() => handleCopy(msg.text)} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-gray-600 dark:text-gray-300" title="Copy"><i className="ph ph-copy text-lg"></i></button>}
                            {msg.text && <button onClick={() => handleReadAloud(msg.text)} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-purple-500" title="Read Aloud"><i className="ph-fill ph-speaker-high text-lg"></i></button>}
                            {isMe && <button onClick={() => handleUnsend(msg.id)} className="p-2 hover:bg-red-50 dark:hover:bg-red-500/20 rounded-xl text-red-500" title="Unsend"><i className="ph ph-trash text-lg"></i></button>}
                          </div>
                        </div>
                      )}

                      {/* The Bubble */}
                      <div className={`msg-bubble flex flex-col px-4 py-2.5 text-[15px] shadow-sm relative transition-transform active:scale-[0.98] ${bgClass} ${isMe ? 'rounded-2xl rounded-br-sm' : 'rounded-2xl rounded-bl-sm'}`} style={{ wordBreak: 'break-word', userSelect: 'none' }} onDoubleClick={() => handleLikeMessage(msg.id)}>
                        
                        {/* Reply Box */}
                        {msg.replyTo && (
                          <div className={`mb-2 pl-3 border-l-2 text-sm rounded-r-md py-1 px-2 ${isMe ? 'border-white/50 bg-black/10' : 'border-gray-400 bg-black/5 dark:bg-white/5'}`}>
                            <div className="font-bold text-[11px] opacity-80 mb-0.5">{msg.replyTo.sender}</div>
                            <div className="opacity-90 line-clamp-2 leading-tight">{msg.replyTo.text || "🖼️ Attachment"}</div>
                          </div>
                        )}

                        {/* Image */}
                        {msg.image && <img src={msg.image} onClick={() => setViewingImage(msg.image)} className="rounded-xl mb-1 max-w-full max-h-[300px] object-cover cursor-zoom-in active:opacity-80 transition-opacity" />}
                        {msg.text && <div className="leading-snug">{msg.text}</div>}
                        <div className={`text-[10px] mt-1 text-right flex justify-end items-center gap-1 ${isMe ? 'text-white/70' : 'text-gray-500 dark:text-gray-400'}`}>{formatTime(msg.timestamp)}</div>

                        {/* Likes & Reactions Badge */}
                        {(msg.liked || (msg.reactions && msg.reactions.length > 0)) && (
                          <div className={`absolute -bottom-2 ${isMe ? '-left-2' : '-right-2'} bg-white dark:bg-gray-800 rounded-full px-1.5 py-0.5 shadow-md border border-gray-100 dark:border-gray-700 animate-zoom-in flex items-center gap-0.5 text-[10px]`}>
                            {msg.liked && <i className="ph-fill ph-heart text-red-500 text-xs"></i>}
                            {msg.reactions && msg.reactions.map((r, i) => <span key={i}>{r}</span>)}
                          </div>
                        )}
                      </div>
                    </div>
                    {/* Read Receipts */}
                    {isMe && isLastByMe && msg.status && (
                      <div className="text-[11px] text-gray-400 dark:text-gray-500 mt-1 flex justify-end pr-1 capitalize">{msg.status}</div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* INPUT AREA */}
            <div className={`p-3 sm:p-4 shrink-0 border-t z-20 ${isDarkMode ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-100'}`}>
              
              {replyingTo && (
                <div className={`mb-3 px-4 py-2 rounded-xl flex items-center justify-between border-l-4 border-blue-500 shadow-sm ${isDarkMode ? 'bg-gray-800' : 'bg-gray-50'}`}>
                  <div className="flex flex-col overflow-hidden pr-4">
                    <span className="text-xs font-bold text-blue-500">Replying to {replyingTo.sender}</span>
                    <span className="text-sm text-gray-500 truncate">{replyingTo.text || "Attachment"}</span>
                  </div>
                  <button onClick={() => setReplyingTo(null)} className="p-1 hover:bg-black/10 rounded-full text-gray-500"><i className="ph ph-x text-lg"></i></button>
                </div>
              )}

              <form onSubmit={handleSend} className={`flex items-center gap-1 sm:gap-2 rounded-full px-2 py-1.5 min-h-[48px] border shadow-sm ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-gray-50 border-gray-200'}`}>
                
                <div className="flex items-center relative">
                  {/* GIF */}
                  <div className="relative">
                    <button type="button" onClick={() => { setShowEmojis(false); setShowGifs(!showGifs); }} className="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 flex items-center justify-center font-bold text-[10px] tracking-wider">
                      <div className="border-2 border-current rounded-md px-1 py-0.5 leading-none">GIF</div>
                    </button>
                    {showGifs && (
                      <div className={`absolute bottom-14 left-0 shadow-2xl rounded-2xl p-3 w-80 h-96 flex flex-col gap-3 z-30 border ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
                        <div className={`flex items-center gap-2 px-3 py-2 rounded-xl border ${isDarkMode ? 'bg-gray-900 border-gray-700' : 'bg-gray-100 border-transparent'}`}>
                          <i className="ph ph-magnifying-glass text-gray-400"></i>
                          <input type="text" placeholder="Search Tenor..." value={gifSearchTerm} onChange={(e) => setGifSearchTerm(e.target.value)} className="bg-transparent border-none focus:ring-0 outline-none w-full text-sm text-current" autoFocus />
                        </div>
                        <div className="flex-1 overflow-y-auto grid grid-cols-2 gap-2 pr-1 custom-scrollbar">
                          {isSearchingGifs ? (
                            <div className="col-span-2 flex justify-center items-center mt-10"><div className="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>
                          ) : tenorGifs.length > 0 ? tenorGifs.map((gifUrl, index) => (
                            <button key={index} type="button" onClick={() => handleSend(null, "", gifUrl)} className="rounded-xl overflow-hidden hover:opacity-80 transition-opacity bg-gray-100 dark:bg-gray-900 h-28 relative group shadow-sm">
                              <img src={gifUrl} className="w-full h-full object-cover" loading="lazy" />
                            </button>
                          )) : (
                            <div className="col-span-2 text-center text-gray-500 text-sm mt-10">No GIFs found</div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>

                  {/* EMOJI */}
                  <div className="relative">
                    <button type="button" onClick={() => { setShowGifs(false); setShowEmojis(!showEmojis); }} className="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300"><i className="ph ph-smiley text-2xl"></i></button>
                    {showEmojis && (
                      <div className={`absolute bottom-14 left-0 shadow-2xl rounded-2xl p-3 grid grid-cols-6 gap-2 w-72 max-h-64 overflow-y-auto custom-scrollbar z-30 border ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
                        {COMMON_EMOJIS.map((emoji, idx) => (
                          <button key={idx} type="button" onClick={() => { setInputText(prev => prev + emoji); }} className={`text-2xl rounded-xl p-1 hover:scale-125 transition-transform ${isDarkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-100'}`}>{emoji}</button>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                <button type="button" onClick={() => fileInputRef.current?.click()} className="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300"><i className="ph ph-image text-2xl"></i></button>

                <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="Message..." className="flex-1 bg-transparent border-none focus:ring-0 text-[15px] px-2 outline-none w-full min-w-0" />

                {!inputText.trim() ? (
                  <div className="flex items-center">
                    <button type="button" onClick={handleVoiceInput} className={`p-2 transition-colors hidden sm:block ${isRecording ? 'text-red-500 animate-pulse' : 'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>
                      <i className={`ph-fill ph-microphone text-2xl`}></i>
                    </button>
                    <button type="button" onClick={() => handleSend(null, "❤️")} className="p-2 text-red-500 hover:scale-110 active:scale-95 transition-transform"><i className="ph-fill ph-heart text-2xl"></i></button>
                  </div>
                ) : (
                  <button type="submit" className={`p-2 font-bold transition-colors mr-1 ${chatColor === 'blue' ? 'text-blue-500' : chatColor === 'purple' ? 'text-purple-500' : chatColor === 'pink' ? 'text-pink-500' : chatColor === 'rose' ? 'text-rose-500' : chatColor === 'emerald' ? 'text-emerald-500' : 'text-gray-900 dark:text-white'}`}>Send</button>
                )}
              </form>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
