<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Direct Messages</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase Setup -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    window.Firebase = {
      initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
      getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, updateDoc
    };
  </script>

  <style>
    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(75, 85, 99, 0.5); }
    
    /* Wallpapers */
    .bg-paper-doodle { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
    .bg-paper-grid { background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0V0zm20 20h20v20H20V20zM0 20h20v20H0V20z' fill='%239C92AC' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E"); }
    .bg-paper-stars { background-image: url("data:image/svg+xml,%3Csvg width='52' height='26' viewBox='0 0 52 26' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.1'%3E%3Cpath d='M10 10c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6h2c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4v2c-3.314 0-6-2.686-6-6 0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6zm25.464-1.95l8.486 8.486-1.414 1.414-8.486-8.486 1.414-1.414z' /%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
    
    /* Animations */
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
    
    @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    .recording-pulse { animation: pulse-red 1.5s infinite; }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
      20% { opacity: 1; transform: translateY(-10vh) scale(1.2) rotate(-10deg); }
      100% { transform: translateY(-80vh) scale(1.5) rotate(20deg); opacity: 0; }
    }
    .animate-float {
      animation: floatUp ease-in forwards;
      position: absolute;
      bottom: 0;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 transition-colors duration-300 antialiased text-gray-900 dark:text-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // CONFIGURATION & CONSTANTS
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyBh-63U8Zmi9IrCH17q_Lym31W4Dl4nHNU",
      authDomain: "myorifatechat.firebaseapp.com",
      projectId: "myorifatechat",
      storageBucket: "myorifatechat.firebasestorage.app",
      messagingSenderId: "514262745271",
      appId: "1:514262745271:web:0f7c45f38e68279b390d32"
    };

    const appId = 'daksh-brahmgeet-chat-v3';

    const WEBHOOKS = {
      Daksh: "https://discord.com/api/webhooks/1484129273173381130/Nl0nlQlzK9HlU_t1jgW_tyqvQYIWmC2l-1fOmUfIAQxOK4c4DpZhCZQIxg4qp-PHe5fN",
      Brahmgeet: "https://discord.com/api/webhooks/1484129276109262909/oIAQEcDMz1ahh4mfT5oaIzbchnXKlpLgoWcJGQ7L-3zLSayINLWVQfKWRApxn4dXh8Wz"
    };

    const COMMON_EMOJIS = ["😂", "❤️", "😍", "😭", "😊", "🥺", "💀", "🔥", "🥰", "✨", "👍", "🙏", "👀", "💯", "💕", "🤭", "🤣", "😘", "😜", "😎", "🤩", "🥳", "😏", "🙄", "😴", "🤯", "🥶", "🤬", "😈", "👻", "👽", "🤖"];
    const QUICK_REACTIONS = ["❤️", "😂", "😮", "😢", "🙏"];
    const CHAT_COLORS = [
      { name: 'Blue', class: 'bg-blue-500', value: 'blue' }, { name: 'Purple', class: 'bg-purple-500', value: 'purple' },
      { name: 'Pink', class: 'bg-pink-500', value: 'pink' }, { name: 'Rose', class: 'bg-rose-500', value: 'rose' },
      { name: 'Green', class: 'bg-emerald-500', value: 'emerald' }, { name: 'Dark', class: 'bg-gray-800', value: 'gray' }
    ];
    const WALLPAPERS = [
      { name: 'Default', class: '' }, { name: 'Grid', class: 'bg-paper-grid' },
      { name: 'Doodle', class: 'bg-paper-doodle' }, { name: 'Stars', class: 'bg-paper-stars' }
    ];

    // ==========================================
    // UTILITY FUNCTIONS
    // ==========================================
    const formatTime = (dateString) => new Date(dateString).toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit' });
    const isSameDay = (d1, d2) => {
      const date1 = new Date(d1), date2 = new Date(d2);
      return date1.getFullYear() === date2.getFullYear() && date1.getMonth() === date2.getMonth() && date1.getDate() === date2.getDate();
    };
    const getDateLabel = (dateString) => {
      const date = new Date(dateString), today = new Date(), yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      if (isSameDay(date, today)) return "Today";
      if (isSameDay(date, yesterday)) return "Yesterday";
      return date.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    };

    const compressImage = (dataUrl) => {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800, MAX_HEIGHT = 800;
          let width = img.width, height = img.height;
          if (width > height && width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } 
          else if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.6));
        };
        img.src = dataUrl;
      });
    };

    const blobToBase64 = (blob) => {
      return new Promise((resolve, _) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [fbApp, setFbApp] = useState(null);
      const [fbAuth, setFbAuth] = useState(null);
      const [fbDb, setFbDb] = useState(null);
      const [backendUser, setBackendUser] = useState(null);
      
      const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('chat_identity') || null);
      const [messages, setMessages] = useState([]);
      const [inputText, setInputText] = useState("");
      
      const [showEmojis, setShowEmojis] = useState(false);
      const [showGifs, setShowGifs] = useState(false);
      const [gifSearchTerm, setGifSearchTerm] = useState("");
      const [replyingTo, setReplyingTo] = useState(null);
      const [showSettings, setShowSettings] = useState(false);
      const [activeContextMenu, setActiveContextMenu] = useState(null);
      const [viewingImage, setViewingImage] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [floatingEmojis, setFloatingEmojis] = useState([]);
      
      // Voice Recording State
      const [isRecording, setIsRecording] = useState(false);
      const [recordingTime, setRecordingTime] = useState(0);
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const recordingTimerRef = useRef(null);
      const maxRecordingTime = 60; // 60 seconds hard limit to prevent >1MB payloads

      // Presence / Last Seen State
      const [otherUserStatus, setOtherUserStatus] = useState(null);
      
      const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('chat_theme') === 'dark');
      const [chatColor, setChatColor] = useState(() => localStorage.getItem('chat_color') || 'blue');
      const [wallpaper, setWallpaper] = useState(() => localStorage.getItem('chat_wallpaper') || '');
      const [nickname, setNickname] = useState(() => localStorage.getItem('chat_nickname') || '');

      const [tenorGifs, setTenorGifs] = useState([]);
      const chatContainerRef = useRef(null);
      const fileInputRef = useRef(null);
      const cameraInputRef = useRef(null);

      // ------------------------------------------
      // 1. INITIALIZE FIREBASE
      // ------------------------------------------
      useEffect(() => {
        if (!window.Firebase) return;
        try {
          const app = window.Firebase.initializeApp(firebaseConfig);
          const auth = window.Firebase.getAuth(app);
          const db = window.Firebase.getFirestore(app);
          
          setFbApp(app); setFbAuth(auth); setFbDb(db);

          const initAuth = async () => {
            try { await window.Firebase.signInAnonymously(auth); } catch (err) { console.error("Auth Error:", err); }
          };
          initAuth();
          const unsubscribe = window.Firebase.onAuthStateChanged(auth, setBackendUser);
          return () => unsubscribe();
        } catch (error) { console.error("Firebase Init Error:", error); }
      }, []);

      // ------------------------------------------
      // 2. FETCH MESSAGES & UPDATE READ STATUS
      // ------------------------------------------
      useEffect(() => {
        if (!backendUser || !fbDb || !currentUser) return;

        const messagesRef = window.Firebase.collection(fbDb, 'artifacts', appId, 'public', 'data', 'chat_messages');
        const unsubscribe = window.Firebase.onSnapshot(messagesRef, (snapshot) => {
          const msgs = [];
          
          snapshot.forEach(doc => {
            const data = doc.data();
            msgs.push({ ...data, id: doc.id });

            // READ RECEIPTS: If I receive a message not from me, and its status is not read, mark it as read.
            if (data.sender !== currentUser && data.status !== 'read') {
              window.Firebase.setDoc(doc.ref, { status: 'read' }, { merge: true });
            }
          });
          
          msgs.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
          setMessages(msgs);
          scrollToBottom();
        });

        return () => unsubscribe();
      }, [backendUser, fbDb, currentUser]);

      // ------------------------------------------
      // 3. PRESENCE (LAST ACTIVE)
      // ------------------------------------------
      useEffect(() => {
        if (!backendUser || !fbDb || !currentUser) return;

        // Update my own status
        const myStatusRef = window.Firebase.doc(fbDb, 'artifacts', appId, 'public', 'data', 'chat_users', currentUser);
        const updatePresence = () => {
          window.Firebase.setDoc(myStatusRef, { lastActive: Date.now(), isOnline: true }, { merge: true });
        };
        
        updatePresence();
        const interval = setInterval(updatePresence, 30000); // Heartbeat every 30s
        
        const handleVisibility = () => {
          if (document.visibilityState === 'hidden') {
            window.Firebase.setDoc(myStatusRef, { lastActive: Date.now(), isOnline: false }, { merge: true });
          } else {
            updatePresence();
          }
        };
        document.addEventListener('visibilitychange', handleVisibility);

        // Listen to partner's status
        const defaultOtherPerson = currentUser === 'Daksh' ? 'Brahmgeet' : 'Daksh';
        const partnerStatusRef = window.Firebase.doc(fbDb, 'artifacts', appId, 'public', 'data', 'chat_users', defaultOtherPerson);
        
        const unsubPresence = window.Firebase.onSnapshot(partnerStatusRef, (doc) => {
          if (doc.exists()) setOtherUserStatus(doc.data());
        });

        return () => {
          clearInterval(interval);
          document.removeEventListener('visibilitychange', handleVisibility);
          unsubPresence();
          // Mark offline on unmount
          window.Firebase.setDoc(myStatusRef, { lastActive: Date.now(), isOnline: false }, { merge: true });
        };
      }, [backendUser, fbDb, currentUser]);

      // Theme Sync
      useEffect(() => {
        localStorage.setItem('chat_theme', isDarkMode ? 'dark' : 'light');
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [isDarkMode]);

      // Tenor Search
      useEffect(() => {
        if (!showGifs) return;
        const fetchGifs = async () => {
          const query = gifSearchTerm.trim() || 'trending';
          try {
            const res = await fetch(`https://g.tenor.com/v1/${query === 'trending' ? 'trending' : 'search?q='+query}&key=LIVDSRZULELA&limit=30`);
            const data = await res.json();
            if (data.results) setTenorGifs(data.results.map(g => g.media[0].gif.url));
          } catch (error) {}
        };
        const timeoutId = setTimeout(fetchGifs, 400);
        return () => clearTimeout(timeoutId);
      }, [gifSearchTerm, showGifs]);

      const scrollToBottom = () => { setTimeout(() => { chatContainerRef.current?.scrollTo({ top: chatContainerRef.current.scrollHeight, behavior: 'smooth' }); }, 100); };
      const selectUser = (name) => { setCurrentUser(name); localStorage.setItem('chat_identity', name); };

      // ------------------------------------------
      // AUDIO RECORDING LOGIC
      // ------------------------------------------
      const startRecording = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mediaRecorder = new MediaRecorder(stream);
          mediaRecorderRef.current = mediaRecorder;
          audioChunksRef.current = [];

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) audioChunksRef.current.push(event.data);
          };

          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
            stream.getTracks().forEach(track => track.stop()); // Turn off mic
            
            // Convert to Base64 to save to Firestore
            const base64Audio = await blobToBase64(audioBlob);
            handleSend(null, "", null, null, null, base64Audio);
          };

          mediaRecorder.start();
          setIsRecording(true);
          setRecordingTime(0);

          recordingTimerRef.current = setInterval(() => {
            setRecordingTime(prev => {
              if (prev >= maxRecordingTime - 1) {
                stopRecording();
                return maxRecordingTime;
              }
              return prev + 1;
            });
          }, 1000);

        } catch (err) {
          alert("Microphone permission denied or not supported.");
          console.error(err);
        }
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
          clearInterval(recordingTimerRef.current);
        }
      };

      const cancelRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.onstop = () => {
            // override onstop to do nothing
            mediaRecorderRef.current.stream.getTracks().forEach(track => track.stop());
          };
          mediaRecorderRef.current.stop();
          setIsRecording(false);
          clearInterval(recordingTimerRef.current);
          setRecordingTime(0);
        }
      };

      // ------------------------------------------
      // SENDING LOGIC (Text, Image, Audio)
      // ------------------------------------------
      const handleSend = async (e, customText = null, customImageUrl = null, customFile = null, localDisplayImage = null, audioBase64 = null) => {
        if (e) e.preventDefault();
        
        const textToSend = customText !== null ? customText : inputText;
        if (!textToSend.trim() && !customImageUrl && !localDisplayImage && !audioBase64) return;

        let finalImage = customImageUrl;
        if (localDisplayImage) finalImage = await compressImage(localDisplayImage); 

        const now = new Date().toISOString();
        const msgId = Date.now().toString() + Math.floor(Math.random() * 1000); 

        const newMessage = {
          id: msgId,
          text: textToSend,
          image: finalImage,
          audio: audioBase64,
          sender: currentUser,
          timestamp: now,
          status: 'sent', // Initially 'sent'. Receiver will change to 'read'.
          reactions: [],
          replyTo: replyingTo ? { id: replyingTo.id, text: replyingTo.text, sender: replyingTo.sender } : null
        };

        setInputText(""); setShowEmojis(false); setShowGifs(false); setReplyingTo(null); setActiveContextMenu(null);

        // Update Presence explicitly on send
        if (backendUser && fbDb) {
          window.Firebase.setDoc(window.Firebase.doc(fbDb, 'artifacts', appId, 'public', 'data', 'chat_users', currentUser), { lastActive: Date.now(), isOnline: true }, { merge: true });
        }

        if (customText === "❤️") triggerBurst("❤️");

        if (backendUser && fbDb) {
          try {
            const docRef = window.Firebase.doc(fbDb, 'artifacts', appId, 'public', 'data', 'chat_messages', msgId);
            await window.Firebase.setDoc(docRef, newMessage);
          } catch (err) { console.error("Send Error:", err); }
        }

        // Discord Notification logic (omitted audio payload for discord to save space, but keeping text/images)
        const webhookUrl = WEBHOOKS[currentUser];
        if (webhookUrl && !audioBase64) {
          const payload = { username: currentUser, avatar_url: currentUser === 'Daksh' ? "https://ui-avatars.com/api/?name=Daksh&background=0D8ABC&color=fff" : "https://ui-avatars.com/api/?name=Brahmgeet&background=F472B6&color=fff" };
          let content = textToSend.trim() || (finalImage ? "[Image]" : "");
          if (replyingTo) content = `> **Replying to ${replyingTo.sender}:** *${replyingTo.text || "[Attachment]"}*\n\n${content}`;
          payload.content = content;
          let body = JSON.stringify(payload);
          let headers = { 'Content-Type': 'application/json' };
          if (customImageUrl) payload.embeds = [{ image: { url: customImageUrl } }];
          try { await fetch(webhookUrl, { method: 'POST', headers, body }); } catch (error) {}
        }
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => handleSend(null, "", null, file, reader.result);
        reader.readAsDataURL(file);
        e.target.value = '';
      };

      const triggerBurst = (emoji) => {
        const newEmojis = Array.from({ length: 10 }).map((_, i) => ({ id: Date.now() + i, emoji, left: 20 + Math.random() * 60 + '%', animationDuration: 1.5 + Math.random() * 1.5 + 's', fontSize: 24 + Math.random() * 24 + 'px', delay: Math.random() * 0.2 + 's' }));
        setFloatingEmojis(prev => [...prev, ...newEmojis]);
        setTimeout(() => setFloatingEmojis(prev => prev.filter(e => !newEmojis.some(n => n.id === e.id))), 3500);
      };

      const handleUnsend = (id) => { 
        if (backendUser && fbDb) window.Firebase.deleteDoc(window.Firebase.doc(fbDb, 'artifacts', appId, 'public', 'data', 'chat_messages', id));
        setActiveContextMenu(null); 
      };

      const handleAddReaction = async (msg, emoji) => {
        triggerBurst(emoji);
        if (backendUser && fbDb) {
          const newReactions = msg.reactions || [];
          if (!newReactions.includes(emoji)) newReactions.push(emoji);
          await window.Firebase.setDoc(window.Firebase.doc(fbDb, 'artifacts', appId, 'public', 'data', 'chat_messages', msg.id), { reactions: newReactions }, { merge: true });
        }
        setActiveContextMenu(null);
      };

      // ------------------------------------------
      // SCREEN 1: LOGIN
      // ------------------------------------------
      if (!currentUser) {
        return (
          <div className={`min-h-[100dvh] flex flex-col items-center justify-center p-4 transition-colors duration-300 ${isDarkMode ? 'bg-gray-950 text-white' : 'bg-gray-50 text-gray-900'}`}>
            <div className={`p-8 rounded-[2rem] shadow-2xl max-w-sm w-full space-y-8 text-center transition-colors duration-300 ${isDarkMode ? 'bg-gray-900 border border-gray-800' : 'bg-white'}`}>
              <div>
                <h1 className="text-3xl font-bold mb-2">Welcome</h1>
                <p className={isDarkMode ? 'text-gray-400' : 'text-gray-500'}>Who is using this device?</p>
              </div>
              <div className="space-y-4">
                <button onClick={() => selectUser('Daksh')} className="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white rounded-2xl font-semibold transition-all shadow-md active:scale-95 text-lg">I am Daksh</button>
                <button onClick={() => selectUser('Brahmgeet')} className="w-full py-4 bg-pink-500 hover:bg-pink-600 text-white rounded-2xl font-semibold transition-all shadow-md active:scale-95 text-lg">I am Brahmgeet</button>
              </div>
            </div>
          </div>
        );
      }

      // ------------------------------------------
      // SCREEN 2: MAIN CHAT INTERFACE
      // ------------------------------------------
      const defaultOtherPerson = currentUser === 'Daksh' ? 'Brahmgeet' : 'Daksh';
      const otherPerson = nickname.trim() !== '' ? nickname : defaultOtherPerson;

      // Format Last Seen
      let lastSeenText = "Connecting...";
      let isOnline = false;
      if (otherUserStatus) {
        // Consider offline if lastActive was > 60 seconds ago AND isOnline flag is false
        const timeDiff = Date.now() - otherUserStatus.lastActive;
        if (otherUserStatus.isOnline && timeDiff < 60000) {
          lastSeenText = "Online";
          isOnline = true;
        } else {
          lastSeenText = `Last seen ${getDateLabel(otherUserStatus.lastActive).toLowerCase()} at ${formatTime(otherUserStatus.lastActive)}`;
        }
      }

      const groupedMessages = [];
      let lastDate = null;
      messages.forEach(msg => {
        const msgDate = new Date(msg.timestamp).toDateString();
        if (msgDate !== lastDate) { groupedMessages.push({ type: 'date', value: msg.timestamp, id: `date-${msg.id}` }); lastDate = msgDate; }
        groupedMessages.push({ type: 'message', ...msg });
      });

      return (
        <div className={`min-h-[100dvh] flex items-center justify-center sm:p-4 md:p-8 transition-colors duration-300 ${isDarkMode ? 'bg-gray-950 text-white' : 'bg-gray-100 text-gray-900'}`} onClick={() => { setActiveContextMenu(null); setShowEmojis(false); setShowGifs(false); }}>
          <div className={`w-full max-w-4xl h-[100dvh] sm:h-[85vh] md:h-[90vh] flex flex-col overflow-hidden relative shadow-2xl transition-all duration-300 sm:rounded-[2.5rem] ${isDarkMode ? 'bg-gray-900 sm:border-gray-800' : 'bg-white sm:border-gray-200'} sm:border`}>
            
            <div className="absolute inset-0 pointer-events-none z-50 overflow-hidden">
              {floatingEmojis.map(item => (<div key={item.id} className="animate-float" style={{ left: item.left, fontSize: item.fontSize, animationDuration: item.animationDuration, animationDelay: item.delay }}>{item.emoji}</div>))}
            </div>

            {/* LIGHTBOX */}
            {viewingImage && (
              <div className="absolute inset-0 bg-black/95 z-[100] flex items-center justify-center p-4 animate-zoom-in">
                <button onClick={() => setViewingImage(null)} className="absolute top-6 right-6 p-2 bg-white/10 hover:bg-white/20 rounded-full text-white"><i className="ph ph-x text-2xl"></i></button>
                <img src={viewingImage} className="max-w-full max-h-[90vh] object-contain rounded-lg" />
              </div>
            )}

            {/* HIDDEN INPUTS */}
            <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" className="hidden" />
            <input type="file" ref={cameraInputRef} onChange={handleFileChange} accept="image/*" capture="environment" className="hidden" />

            {/* HEADER */}
            <div className={`h-16 border-b flex items-center justify-between px-4 z-10 shrink-0 ${isDarkMode ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-100'}`}>
              <div className="flex items-center gap-2 sm:gap-3">
                <button onClick={() => { setCurrentUser(null); localStorage.removeItem('chat_identity'); }} className="p-2 -ml-2 text-red-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors"><i className="ph ph-sign-out text-2xl"></i></button>
                <div className="flex items-center gap-3">
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-inner relative ${otherPerson === 'Brahmgeet' ? 'bg-pink-400' : 'bg-blue-500'}`}>
                    {otherPerson.charAt(0)}
                    {isOnline && <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white dark:border-gray-900 rounded-full"></div>}
                  </div>
                  <div className="flex flex-col">
                    <span className="font-bold text-[15px] leading-tight">{otherPerson}</span>
                    <span className={`text-[11px] font-medium ${isOnline ? 'text-green-500' : 'text-gray-500 dark:text-gray-400'}`}>{lastSeenText}</span>
                  </div>
                </div>
              </div>
              <button onClick={(e) => { e.stopPropagation(); setShowSettings(!showSettings); }} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors"><i className="ph ph-gear text-2xl"></i></button>
            </div>

            {/* SETTINGS PANEL */}
            {showSettings && (
              <div className={`absolute top-16 right-0 bottom-0 w-full sm:w-80 z-40 shadow-2xl flex flex-col transform transition-transform duration-300 ${isDarkMode ? 'bg-gray-900 border-l border-gray-800' : 'bg-white border-l border-gray-100'}`} onClick={(e) => e.stopPropagation()}>
                <div className="p-4 space-y-6 overflow-y-auto flex-1 custom-scrollbar">
                  <div>
                    <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Theme</h3>
                    <div className={`flex items-center justify-between p-3 rounded-xl mb-3 ${isDarkMode ? 'bg-gray-800' : 'bg-gray-50'}`}>
                      <span className="font-medium">Dark Mode</span>
                      <button onClick={() => setIsDarkMode(!isDarkMode)} className={`w-12 h-6 rounded-full p-1 transition-colors relative ${isDarkMode ? 'bg-blue-500' : 'bg-gray-300'}`}><div className={`w-4 h-4 bg-white rounded-full transition-transform ${isDarkMode ? 'translate-x-6' : 'translate-x-0'}`} /></button>
                    </div>
                  </div>
                  <div>
                    <h3 className="text-sm font-semibold text-gray-500 uppercase mb-3">Chat Color</h3>
                    <div className="grid grid-cols-3 gap-3">
                      {CHAT_COLORS.map(color => (
                        <button key={color.value} onClick={() => setChatColor(color.value)} className={`flex flex-col items-center gap-2 p-2 rounded-xl border-2 transition-all ${chatColor === color.value ? (isDarkMode ? 'border-white' : 'border-gray-900') : 'border-transparent hover:bg-black/5'}`}><div className={`w-8 h-8 rounded-full ${color.class}`} /><span className="text-xs font-medium">{color.name}</span></button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* CHAT AREA */}
            <div ref={chatContainerRef} className={`flex-1 overflow-y-auto p-4 space-y-3 scroll-smooth custom-scrollbar ${wallpaper} ${isDarkMode && !wallpaper ? 'bg-gray-950' : ''} ${!isDarkMode && !wallpaper ? 'bg-white' : ''}`}>
              <div className="flex flex-col items-center justify-center py-10 text-center space-y-3">
                <div className={`w-24 h-24 rounded-full flex items-center justify-center text-white text-4xl font-bold shadow-lg ${otherPerson === 'Brahmgeet' ? 'bg-pink-400' : 'bg-blue-500'}`}>{otherPerson.charAt(0)}</div>
                <h2 className="text-xl font-bold bg-white/50 dark:bg-black/50 px-3 py-1 rounded-xl backdrop-blur-sm">{otherPerson}</h2>
                <p className="text-sm text-gray-400 bg-gray-100 dark:bg-gray-800 px-4 py-1.5 rounded-full mt-2 backdrop-blur-sm">Real-time Sync Active</p>
              </div>

              {groupedMessages.map((item) => {
                if (item.type === 'date') return <div key={item.id} className="flex justify-center my-6"><span className="text-xs font-semibold px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 shadow-sm">{getDateLabel(item.value)}</span></div>;

                const msg = item;
                const isMe = msg.sender === currentUser;
                const showContext = activeContextMenu === msg.id;
                const bgClass = !isMe ? (isDarkMode ? 'bg-gray-800 text-gray-100' : 'bg-white border border-gray-100 text-gray-900') : `bg-${chatColor}-500 text-white shadow-md border border-transparent`;

                return (
                  <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-1`}>
                    <div className={`flex items-end gap-2 max-w-[85%] sm:max-w-[70%] relative group`}>
                      <div className={`opacity-0 group-hover:opacity-100 transition-opacity flex items-center ${isMe ? 'order-1 pr-2' : 'order-2 pl-2'}`}>
                        <button onClick={(e) => { e.stopPropagation(); setActiveContextMenu(showContext ? null : msg.id); }} className="p-1.5 text-gray-400 rounded-full hover:bg-white/50 dark:hover:bg-black/50"><i className="ph-fill ph-dots-three-vertical text-lg"></i></button>
                      </div>

                      {showContext && (
                        <div className={`context-menu-container absolute -top-12 ${isMe ? 'right-0' : 'left-0'} z-30 flex flex-col gap-1 p-1.5 rounded-2xl shadow-xl border animate-zoom-in ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`} onClick={(e) => e.stopPropagation()}>
                          <div className="flex items-center gap-1 p-1 border-b border-gray-100 dark:border-gray-700 pb-2 mb-1">
                            {QUICK_REACTIONS.map(emoji => (<button key={emoji} onClick={() => handleAddReaction(msg, emoji)} className="text-xl hover:scale-125 transition-transform px-1">{emoji}</button>))}
                          </div>
                          <div className="flex gap-1">
                            <button onClick={() => { setReplyingTo(msg); setActiveContextMenu(null); }} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-blue-500"><i className="ph ph-arrow-u-up-left text-lg"></i></button>
                            {msg.text && <button onClick={() => { navigator.clipboard.writeText(msg.text); setActiveContextMenu(null); }} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-gray-600 dark:text-gray-300"><i className="ph ph-copy text-lg"></i></button>}
                            {isMe && <button onClick={() => handleUnsend(msg.id)} className="p-2 hover:bg-red-50 dark:hover:bg-red-500/20 rounded-xl text-red-500"><i className="ph ph-trash text-lg"></i></button>}
                          </div>
                        </div>
                      )}

                      <div className={`msg-bubble flex flex-col px-3 py-2 text-[15px] shadow-sm relative ${bgClass} ${isMe ? 'rounded-2xl rounded-br-sm' : 'rounded-2xl rounded-bl-sm'}`} style={{ wordBreak: 'break-word' }}>
                        {msg.replyTo && (
                          <div className={`mb-2 pl-2 border-l-2 text-sm rounded-r-md py-1 px-2 ${isMe ? 'border-white/50 bg-black/10' : 'border-gray-400 bg-black/5 dark:bg-white/5'}`}>
                            <div className="font-bold text-[11px] opacity-80 mb-0.5">{msg.replyTo.sender}</div>
                            <div className="opacity-90 line-clamp-1 leading-tight">{msg.replyTo.text || "Attachment"}</div>
                          </div>
                        )}
                        {msg.image && <img src={msg.image} onClick={() => setViewingImage(msg.image)} className="rounded-xl mb-1 max-w-full max-h-[250px] object-cover cursor-zoom-in" />}
                        {msg.audio && (
                          <div className="mb-1 mt-1">
                            <audio controls src={msg.audio} className={`h-10 w-48 ${isMe ? 'invert filter' : ''}`} style={{ outline: 'none' }}></audio>
                          </div>
                        )}
                        {msg.text && <div className="leading-snug">{msg.text}</div>}
                        
                        {/* Timestamps and Read Receipts */}
                        <div className={`text-[10px] mt-1 text-right flex justify-end items-center gap-1 ${isMe ? 'text-white/80' : 'text-gray-500 dark:text-gray-400'}`}>
                          {formatTime(msg.timestamp)}
                          {isMe && (
                            <span className="flex items-center ml-0.5">
                              {msg.status === 'sent' && <i className="ph ph-check opacity-70"></i>}
                              {msg.status === 'delivered' && <i className="ph ph-checks opacity-70"></i>}
                              {msg.status === 'read' && <i className="ph-fill ph-checks text-blue-300"></i>}
                            </span>
                          )}
                        </div>

                        {(msg.reactions && msg.reactions.length > 0) && (
                          <div className={`absolute -bottom-2 ${isMe ? '-left-2' : '-right-2'} bg-white dark:bg-gray-800 rounded-full px-1.5 py-0.5 shadow-md border border-gray-100 dark:border-gray-700 flex items-center gap-0.5 text-[10px]`}>
                            {msg.reactions.map((r, i) => <span key={i}>{r}</span>)}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* INPUT AREA */}
            <div className={`p-2 sm:p-4 shrink-0 border-t z-20 ${isDarkMode ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-100'}`} onClick={(e) => e.stopPropagation()}>
              {replyingTo && (
                <div className={`mb-2 px-3 py-1.5 rounded-xl flex items-center justify-between border-l-4 border-blue-500 shadow-sm ${isDarkMode ? 'bg-gray-800' : 'bg-gray-50'}`}>
                  <div className="flex flex-col overflow-hidden pr-4">
                    <span className="text-xs font-bold text-blue-500">Replying to {replyingTo.sender}</span>
                    <span className="text-xs text-gray-500 truncate">{replyingTo.text || "Attachment"}</span>
                  </div>
                  <button onClick={() => setReplyingTo(null)} className="p-1 hover:bg-black/10 rounded-full"><i className="ph ph-x"></i></button>
                </div>
              )}

              {/* Toolbar above input for media */}
              <div className="flex items-center gap-3 px-2 pb-2 text-gray-500 dark:text-gray-400">
                <button onClick={() => cameraInputRef.current?.click()} className="hover:text-blue-500 transition-colors" title="Take Photo"><i className="ph ph-camera text-2xl"></i></button>
                <button onClick={() => fileInputRef.current?.click()} className="hover:text-blue-500 transition-colors" title="Gallery"><i className="ph ph-image text-2xl"></i></button>
                
                <div className="relative">
                  <button onClick={() => { setShowEmojis(false); setShowGifs(!showGifs); }} className="font-bold text-[10px] hover:text-blue-500"><div className="border-2 border-current rounded-md px-1 py-0.5">GIF</div></button>
                  {showGifs && (
                    <div className={`absolute bottom-10 left-0 shadow-2xl rounded-2xl p-2 w-72 h-80 flex flex-col gap-2 z-30 border ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
                      <input type="text" placeholder="Search Tenor..." value={gifSearchTerm} onChange={(e) => setGifSearchTerm(e.target.value)} className={`w-full p-2 rounded-xl text-sm outline-none ${isDarkMode ? 'bg-gray-900' : 'bg-gray-100'}`} />
                      <div className="flex-1 overflow-y-auto grid grid-cols-2 gap-1 custom-scrollbar">
                        {tenorGifs.map((gifUrl, index) => (<button key={index} onClick={() => handleSend(null, "", gifUrl)} className="rounded-lg overflow-hidden h-24"><img src={gifUrl} className="w-full h-full object-cover" /></button>))}
                      </div>
                    </div>
                  )}
                </div>

                <div className="relative">
                  <button onClick={() => { setShowGifs(false); setShowEmojis(!showEmojis); }} className="hover:text-blue-500"><i className="ph ph-smiley text-2xl"></i></button>
                  {showEmojis && (
                    <div className={`absolute bottom-10 left-0 shadow-2xl rounded-2xl p-3 grid grid-cols-6 gap-2 w-72 max-h-60 overflow-y-auto z-30 border custom-scrollbar ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-100'}`}>
                      {COMMON_EMOJIS.map((emoji, idx) => (<button key={idx} onClick={() => setInputText(prev => prev + emoji)} className="text-2xl rounded-xl p-1 hover:bg-black/10">{emoji}</button>))}
                    </div>
                  )}
                </div>
              </div>

              {/* Text / Voice Input */}
              <form onSubmit={handleSend} className={`flex items-center gap-2 rounded-full px-2 py-1.5 min-h-[48px] border shadow-sm ${isDarkMode ? 'bg-gray-800 border-gray-700' : 'bg-gray-50 border-gray-200'}`}>
                
                {isRecording ? (
                  <div className="flex-1 flex items-center justify-between px-3">
                    <div className="flex items-center gap-3 text-red-500 font-medium">
                      <div className="w-3 h-3 bg-red-500 rounded-full recording-pulse"></div>
                      00:{recordingTime < 10 ? `0${recordingTime}` : recordingTime}
                    </div>
                    <button type="button" onClick={cancelRecording} className="text-sm text-gray-500 hover:text-red-500">Cancel</button>
                  </div>
                ) : (
                  <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="Type a message..." className="flex-1 bg-transparent border-none text-[15px] px-3 outline-none w-full min-w-0 text-current" />
                )}
                
                {!inputText.trim() && !isRecording ? (
                  <button type="button" onClick={startRecording} className="p-2 text-gray-500 hover:text-blue-500 transition-colors"><i className="ph-fill ph-microphone text-2xl"></i></button>
                ) : isRecording ? (
                  <button type="button" onClick={stopRecording} className="p-2 bg-blue-500 text-white rounded-full shadow-md"><i className="ph-fill ph-paper-plane-right text-lg"></i></button>
                ) : (
                  <button type="submit" className={`p-2 font-bold transition-colors mr-1 ${chatColor === 'blue' ? 'text-blue-500' : 'text-pink-500'}`}>Send</button>
                )}
              </form>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
