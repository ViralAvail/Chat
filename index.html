  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CONFIG = {
      firebase: {
        apiKey: "AIzaSyBh-63U8Zmi9IrCH17q_Lym31W4Dl4nHNU",
        authDomain: "myorifatechat.firebaseapp.com",
        projectId: "myorifatechat",
        storageBucket: "myorifatechat.firebasestorage.app",
        messagingSenderId: "514262745271",
        appId: "1:514262745271:web:0f7c45f38e68279b390d32"
      },
      appId: 'daksh-brahmgeet-polished-v3',
      webhooks: {
        Daksh: "https://discord.com/api/webhooks/1484129273173381130/Nl0nlQlzK9HlU_t1jgW_tyqvQYIWmC2l-1fOmUfIAQxOK4c4DpZhCZQIxg4qp-PHe5fN",
        Brahmgeet: "https://discord.com/api/webhooks/1484129276109262909/oIAQEcDMz1ahh4mfT5oaIzbchnXKlpLgoWcJGQ7L-3zLSayINLWVQfKWRApxn4dXh8Wz"
      },
      limits: { maxVoiceSeconds: 60, maxImageWidth: 1024, maxImageHeight: 1024, imageQuality: 0.7 }
    };

    const EMOJIS = {
      common: ["😂", "❤️", "😍", "😭", "😊", "🥺", "💀", "🔥", "🥰", "✨", "👍", "🙏", "👀", "💯", "💕", "🤭", "🤣", "😘", "😜", "😎", "🤩", "🥳", "😏", "🙄", "😴", "🤯", "🥶", "🤬", "😈", "👻", "👽", "🤖"],
      quick: ["❤️", "😂", "😮", "😢", "🙏"]
    };

    const THEMES = {
      colors: [
        { name: 'Blue', class: 'bg-blue-500', value: 'blue' }, { name: 'Purple', class: 'bg-purple-500', value: 'purple' },
        { name: 'Pink', class: 'bg-pink-500', value: 'pink' }, { name: 'Rose', class: 'bg-rose-500', value: 'rose' },
        { name: 'Green', class: 'bg-emerald-500', value: 'emerald' }, { name: 'Dark', class: 'bg-gray-800', value: 'gray' }
      ],
      wallpapers: [
        { name: 'Default', class: '' }, { name: 'Grid', class: 'bg-paper-grid' },
        { name: 'Doodle', class: 'bg-paper-doodle' }, { name: 'Stars', class: 'bg-paper-stars' }
      ]
    };

    // UTILITIES
    const formatTime = (dateString) => {
      if (!dateString) return "";
      return new Date(dateString).toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit' });
    };

    const isSameDay = (d1, d2) => {
      const date1 = new Date(d1), date2 = new Date(d2);
      return date1.getFullYear() === date2.getFullYear() && date1.getMonth() === date2.getMonth() && date1.getDate() === date2.getDate();
    };

    const getDateLabel = (dateString) => {
      const date = new Date(dateString), today = new Date(), yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      if (isSameDay(date, today)) return "Today";
      if (isSameDay(date, yesterday)) return "Yesterday";
      return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    };

    const compressImage = (dataUrl) => {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;
          const { maxImageWidth, maxImageHeight, imageQuality } = CONFIG.limits;
          if (width > height && width > maxImageWidth) { height *= maxImageWidth / width; width = maxImageWidth; } 
          else if (height > maxImageHeight) { width *= maxImageHeight / height; height = maxImageHeight; }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', imageQuality));
        };
        img.src = dataUrl;
      });
    };

    const blobToBase64 = (blob) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
    };

    const renderTextWithLinks = (text) => {
      if (!text) return null;
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      const parts = text.split(urlRegex);
      return parts.map((part, i) => {
        if (part.match(urlRegex)) {
          return <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="underline underline-offset-2 hover:opacity-80 font-bold transition-opacity break-all decoration-white/50" onClick={(e) => e.stopPropagation()}>{part}</a>;
        }
        return <span key={i}>{part}</span>;
      });
    };

    function useFirebase() {
      const [fbState, setFbState] = useState({ db: null, auth: null, user: null, error: null });
      useEffect(() => {
        if (!window.Firebase) { setFbState(prev => ({ ...prev, error: "Firebase script not loaded" })); return; }
        try {
          const app = window.Firebase.initializeApp(CONFIG.firebase);
          const auth = window.Firebase.getAuth(app);
          const db = window.Firebase.getFirestore(app);
          window.Firebase.signInAnonymously(auth).catch(err => setFbState(prev => ({ ...prev, error: "Auth failed." })));
          const unsubscribe = window.Firebase.onAuthStateChanged(auth, (user) => setFbState({ db, auth, user, error: null }));
          return () => unsubscribe();
        } catch (err) { setFbState(prev => ({ ...prev, error: "Init failed." })); }
      }, []);
      return fbState;
    }

    const Avatar = ({ name, isOnline, size = "md", colorClass = "bg-blue-500" }) => {
      const sizeClasses = { sm: "w-8 h-8 text-sm", md: "w-10 h-10 text-base", lg: "w-16 h-16 text-2xl", xl: "w-28 h-28 text-5xl" };
      return (
        <div className={`rounded-full flex items-center justify-center text-white font-bold shadow-inner relative shrink-0 ${colorClass} ${sizeClasses[size]}`}>
          {name ? name.charAt(0).toUpperCase() : "?"}
          {isOnline && size !== "xl" && <div className={`absolute bottom-0 right-0 rounded-full bg-green-500 border-2 border-white dark:border-gray-900 ${size === 'sm' ? 'w-2.5 h-2.5' : 'w-3 h-3'}`}></div>}
        </div>
      );
    };

    const ConfirmModal = ({ title, message, onConfirm, onCancel, confirmText = "Confirm", isDanger = true }) => (
      <div className="absolute inset-0 bg-black/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in" onClick={onCancel}>
        <div className="w-full max-w-sm p-6 rounded-3xl shadow-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 animate-slide-up" onClick={e => e.stopPropagation()}>
          <h3 className="text-xl font-bold mb-2 text-gray-900 dark:text-white">{title}</h3>
          <p className="text-sm text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">{message}</p>
          <div className="flex gap-3 justify-end">
            <button onClick={onCancel} className="px-5 py-2.5 rounded-xl font-semibold text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Cancel</button>
            {onConfirm && <button onClick={onConfirm} className={`px-5 py-2.5 rounded-xl font-semibold text-white transition-colors shadow-md ${isDanger ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-500 hover:bg-blue-600'}`}>{confirmText}</button>}
          </div>
        </div>
      </div>
    );

    const MediaLightbox = ({ src, onClose }) => {
      if (!src) return null;
      return (
        <div className="absolute inset-0 bg-black/95 z-[100] flex items-center justify-center p-4 animate-fade-in backdrop-blur-md">
          <button onClick={onClose} className="absolute top-6 right-6 w-10 h-10 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-full text-white transition-colors backdrop-blur-lg"><i className="fa-solid fa-xmark text-xl"></i></button>
          <img src={src} className="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl animate-slide-up" />
          <a href={src} download="attachment.jpg" target="_blank" className="absolute bottom-8 right-8 w-14 h-14 flex items-center justify-center bg-blue-500 hover:bg-blue-600 rounded-full text-white shadow-xl transition-transform hover:scale-105"><i className="fa-solid fa-download text-xl"></i></a>
        </div>
      );
    };

    function App() {
      // Identity
      const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('chat_identity') || null);
      
      // Firebase
      const { db, auth, user: backendUser, error: fbError } = useFirebase();

      // State
      const [messages, setMessages] = useState([]);
      const [otherUserPresence, setOtherUserPresence] = useState({ isOnline: false, lastActive: 0, isTyping: false });
      const [inputText, setInputText] = useState("");
      
      const [showEmojis, setShowEmojis] = useState(false);
      const [showGifs, setShowGifs] = useState(false);
      const [gifSearchTerm, setGifSearchTerm] = useState("");
      const [tenorGifs, setTenorGifs] = useState([]);
      const [isSearchingGifs, setIsSearchingGifs] = useState(false);
      
      const [replyingTo, setReplyingTo] = useState(null);
      const [editingMessage, setEditingMessage] = useState(null);
      const [activeContextMenu, setActiveContextMenu] = useState(null);
      
      const [showSettings, setShowSettings] = useState(false);
      const [showProfile, setShowProfile] = useState(false);
      const [viewingImage, setViewingImage] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const [floatingEmojis, setFloatingEmojis] = useState([]);
      
      const [isRecording, setIsRecording] = useState(false);
      const [recordingTime, setRecordingTime] = useState(0);
      
      // Robust Settings State
      const [isDarkMode, setIsDarkMode] = useState(() => {
        const stored = localStorage.getItem('chat_theme');
        return stored ? stored === 'dark' : true;
      });
      const [chatColor, setChatColor] = useState(() => localStorage.getItem('chat_color') || 'blue');
      const [wallpaper, setWallpaper] = useState(() => localStorage.getItem('chat_wallpaper') || '');
      const [customNickname, setCustomNickname] = useState(() => localStorage.getItem('chat_nickname') || '');

      const chatContainerRef = useRef(null);
      const fileInputRef = useRef(null);
      const cameraInputRef = useRef(null);
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const recordingTimerRef = useRef(null);
      const typingTimeoutRef = useRef(null);

      const defaultOtherPerson = currentUser === 'Daksh' ? 'Brahmgeet' : 'Daksh';
      const displayOtherPerson = customNickname.trim() !== '' ? customNickname : defaultOtherPerson;
      const avatarColorClass = displayOtherPerson === 'Brahmgeet' || displayOtherPerson.toLowerCase().includes('brahm') ? 'bg-pink-500' : 'bg-blue-500';

      const selectUser = (name) => {
        setCurrentUser(name);
        localStorage.setItem('chat_identity', name);
      };

      const toggleTheme = () => {
        setIsDarkMode(prev => {
          const newState = !prev;
          localStorage.setItem('chat_theme', newState ? 'dark' : 'light');
          return newState;
        });
      };

      useEffect(() => {
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [isDarkMode]);

      useEffect(() => { localStorage.setItem('chat_color', chatColor); }, [chatColor]);
      useEffect(() => { localStorage.setItem('chat_wallpaper', wallpaper); }, [wallpaper]);
      useEffect(() => { localStorage.setItem('chat_nickname', customNickname); }, [customNickname]);

      // Database listener
      useEffect(() => {
        if (!backendUser || !db || !currentUser) return;
        const messagesCollectionRef = window.Firebase.collection(db, 'artifacts', CONFIG.appId, 'public', 'data', 'messages');
        
        const unsubscribe = window.Firebase.onSnapshot(messagesCollectionRef, (snapshot) => {
          const fetchedMessages = [];
          snapshot.forEach(docSnapshot => {
            const data = docSnapshot.data();
            fetchedMessages.push({ ...data, id: docSnapshot.id });
            // Read receipts logic
            if (data.sender !== currentUser && data.status !== 'read') {
              window.Firebase.updateDoc(docSnapshot.ref, { status: 'read' }).catch(e => console.error(e));
            }
          });
          fetchedMessages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
          
          const isAtBottom = chatContainerRef.current && (chatContainerRef.current.scrollHeight - chatContainerRef.current.scrollTop - chatContainerRef.current.clientHeight < 100);
          setMessages(fetchedMessages);
          if (isAtBottom) scrollToBottom();
        }, (error) => console.error("Firestore Error:", error));
        
        return () => unsubscribe();
      }, [backendUser, db, currentUser]);

      // Presence
      useEffect(() => {
        if (!backendUser || !db || !currentUser) return;
        const myUserRef = window.Firebase.doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'users', currentUser);
        const partnerRef = window.Firebase.doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'users', defaultOtherPerson);

        const updateMyPresence = (isOnline, isTyping = false) => {
          window.Firebase.setDoc(myUserRef, { lastActive: Date.now(), isOnline, isTyping }, { merge: true }).catch(console.warn);
        };
        
        updateMyPresence(true);
        const heartbeat = setInterval(() => updateMyPresence(true, Boolean(inputText.trim())), 45000);
        
        const handleVisibility = () => {
          if (document.visibilityState === 'hidden') updateMyPresence(false);
          else updateMyPresence(true, Boolean(inputText.trim()));
        };
        document.addEventListener('visibilitychange', handleVisibility);

        const unsubPresence = window.Firebase.onSnapshot(partnerRef, (docSnap) => {
          if (docSnap.exists()) setOtherUserPresence(docSnap.data());
        });

        return () => {
          clearInterval(heartbeat);
          document.removeEventListener('visibilitychange', handleVisibility);
          unsubPresence();
          updateMyPresence(false);
        };
      }, [backendUser, db, currentUser, defaultOtherPerson, inputText]);

      // Tenor
      useEffect(() => {
        if (!showGifs) return;
        const fetchGifs = async () => {
          setIsSearchingGifs(true);
          try {
            const query = gifSearchTerm.trim() || 'trending';
            const endpoint = query === 'trending' ? `https://g.tenor.com/v1/trending?key=LIVDSRZULELA&limit=40` : `https://g.tenor.com/v1/search?q=${encodeURIComponent(query)}&key=LIVDSRZULELA&limit=40`;
            const res = await fetch(endpoint);
            if (res.ok) {
              const data = await res.json();
              if (data.results) setTenorGifs(data.results.map(g => g.media[0].gif.url));
            }
          } catch (error) {} finally { setIsSearchingGifs(false); }
        };
        const timeoutId = setTimeout(fetchGifs, 500);
        return () => clearTimeout(timeoutId);
      }, [gifSearchTerm, showGifs]);

      const handleInputChange = (e) => {
        setInputText(e.target.value);
        if (db && currentUser) {
          const myUserRef = window.Firebase.doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'users', currentUser);
          window.Firebase.setDoc(myUserRef, { isTyping: true, lastActive: Date.now() }, { merge: true });
          if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
          typingTimeoutRef.current = setTimeout(() => { window.Firebase.setDoc(myUserRef, { isTyping: false }, { merge: true }); }, 2000);
        }
      };

      const scrollToBottom = () => {
        if (chatContainerRef.current) {
          requestAnimationFrame(() => { chatContainerRef.current?.scrollTo({ top: chatContainerRef.current.scrollHeight, behavior: 'smooth' }); });
        }
      };

      // Audio
      const startRecording = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mediaRecorder = new MediaRecorder(stream);
          mediaRecorderRef.current = mediaRecorder;
          audioChunksRef.current = [];
          mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) audioChunksRef.current.push(event.data); };
          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
            stream.getTracks().forEach(track => track.stop());
            const base64Audio = await blobToBase64(audioBlob);
            handleSendMessage({ audioData: base64Audio });
          };
          mediaRecorder.start();
          setIsRecording(true);
          setRecordingTime(0);
          recordingTimerRef.current = setInterval(() => {
            setRecordingTime(prev => {
              if (prev >= CONFIG.limits.maxVoiceSeconds - 1) { stopRecording(); return CONFIG.limits.maxVoiceSeconds; }
              return prev + 1;
            });
          }, 1000);
        } catch (err) {
          setConfirmDialog({ title: "Microphone Access", message: "Unable to access microphone.", confirmText: "Okay", isDanger: false, onCancel: () => setConfirmDialog(null) });
        }
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          setIsRecording(false);
          clearInterval(recordingTimerRef.current);
        }
      };

      const cancelRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.onstop = () => { mediaRecorderRef.current.stream.getTracks().forEach(track => track.stop()); };
          mediaRecorderRef.current.stop();
          setIsRecording(false);
          clearInterval(recordingTimerRef.current);
          setRecordingTime(0);
        }
      };

      const handleSendMessage = async ({ e = null, customText = null, imageUrl = null, audioData = null, rawFile = null }) => {
        if (e) e.preventDefault();
        const textToDispatch = customText !== null ? customText : inputText;
        if (!textToDispatch.trim() && !imageUrl && !audioData && !rawFile) return;

        setInputText(""); setShowEmojis(false); setShowGifs(false); setActiveContextMenu(null); scrollToBottom();
        const currentReply = replyingTo; 
        setReplyingTo(null); 

        // Handle Edit Route
        if (editingMessage && db) {
           try {
             const docRef = window.Firebase.doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'messages', editingMessage.id);
             await window.Firebase.updateDoc(docRef, { text: textToDispatch, isEdited: true });
             setEditingMessage(null);
           } catch(err) { console.error(err); }
           return; // Stop here for edits
        }

        // Handle New Message Route
        if (db && currentUser) window.Firebase.setDoc(window.Firebase.doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'users', currentUser), { isTyping: false }, { merge: true });

        let finalImageBase64 = imageUrl;
        if (rawFile) finalImageBase64 = await compressImage(rawFile);

        const msgId = `msg_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        const messagePayload = { id: msgId, sender: currentUser, timestamp: new Date().toISOString(), status: 'sent', reactions: [] };

        if (textToDispatch.trim()) messagePayload.text = textToDispatch.trim();
        if (finalImageBase64) messagePayload.image = finalImageBase64;
        if (audioData) messagePayload.audio = audioData;
        if (currentReply) {
          messagePayload.replyTo = { id: currentReply.id, text: currentReply.text, sender: currentReply.sender, hasMedia: !!(currentReply.image || currentReply.audio) };
        }

        if (customText === "❤️") triggerBurst("❤️");
        else if (textToDispatch.trim().length > 0 && textToDispatch.trim().length <= 6) {
          const emojiRegex = /\p{Emoji}/u;
          if (emojiRegex.test(textToDispatch)) triggerBurst(Array.from(textToDispatch).find(char => emojiRegex.test(char)) || "✨");
        }

        if (backendUser && db) {
          try { await window.Firebase.setDoc(window.Firebase.doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'messages', msgId), messagePayload); } 
          catch (err) { console.error(err); }
        }

        // Webhook notification
        const webhookUrl = CONFIG.webhooks[currentUser];
        if (webhookUrl && !audioData) {
          try {
            const discordPayload = { username: currentUser, avatar_url: currentUser === 'Daksh' ? "https://ui-avatars.com/api/?name=Daksh&background=3b82f6&color=fff" : "https://ui-avatars.com/api/?name=Brahmgeet&background=ec4899&color=fff" };
            let contentStr = textToDispatch.trim() || (finalImageBase64 ? "[Sent an image attachment]" : "");
            if (currentReply) {
              const replyExcerpt = currentReply.text ? currentReply.text : (currentReply.image ? "[Image]" : "[Audio]");
              contentStr = `> **Replying to ${currentReply.sender}:** *${replyExcerpt}*\n\n${contentStr}`;
            }
            discordPayload.content = contentStr;
            if (imageUrl && imageUrl.startsWith('http')) discordPayload.embeds = [{ image: { url: imageUrl } }];
            fetch(webhookUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(discordPayload) }).catch(() => {});
          } catch (e) {}
        }
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = () => handleSendMessage({ rawFile: reader.result });
        reader.readAsDataURL(file);
        e.target.value = '';
      };

      const handleClearHistory = () => {
        setConfirmDialog({
          title: "Clear Chat History",
          message: "This will permanently delete all messages for BOTH of you globally.",
          confirmText: "Delete Everywhere",
          isDanger: true,
          onConfirm: () => {
            if (backendUser && db) {
              messages.forEach(msg => { window.Firebase.deleteDoc(window.Firebase.doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'messages', msg.id)).catch(console.warn); });
            }
            setShowSettings(false);
            setConfirmDialog(null);
          },
          onCancel: () => setConfirmDialog(null)
        });
      };

      const handleUnsendMessage = (msgId) => {
        if (backendUser && db) window.Firebase.deleteDoc(window.Firebase.doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'messages', msgId)).catch(console.warn);
        setActiveContextMenu(null);
      };

      const handleReaction = async (msgId, emoji, currentReactions = []) => {
        triggerBurst(emoji);
        if (backendUser && db) {
          const newReactions = [...currentReactions];
          if (!newReactions.includes(emoji)) {
            newReactions.push(emoji);
            await window.Firebase.setDoc(window.Firebase.doc(db, 'artifacts', CONFIG.appId, 'public', 'data', 'messages', msgId), { reactions: newReactions }, { merge: true });
          }
        }
        setActiveContextMenu(null);
      };

      const triggerBurst = (emoji) => {
        const generated = Array.from({ length: 12 }).map((_, i) => ({
          id: `emoji_${Date.now()}_${i}`, emoji, left: `${20 + Math.random() * 60}%`, animationDuration: `${1.2 + Math.random() * 1.5}s`, fontSize: `${20 + Math.random() * 28}px`, delay: `${Math.random() * 0.3}s`
        }));
        setFloatingEmojis(prev => [...prev, ...generated]);
        setTimeout(() => { setFloatingEmojis(prev => prev.filter(e => !generated.some(g => g.id === e.id))); }, 3000);
      };

      const handleTextToSpeech = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          window.speechSynthesis.speak(utterance);
        }
        setActiveContextMenu(null);
      };

      // LOGIN RENDER
      if (!currentUser) {
        return (
          <div className="min-h-[100dvh] flex flex-col items-center justify-center p-4 relative overflow-hidden">
            <div className="p-8 md:p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full space-y-10 text-center bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800 animate-fade-in relative z-10">
              <div className="absolute top-0 left-0 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl -translate-x-10 -translate-y-10"></div>
              <div className="absolute bottom-0 right-0 w-32 h-32 bg-pink-500/10 rounded-full blur-3xl translate-x-10 translate-y-10"></div>

              {fbError && (
                 <div className="bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-600 dark:text-red-400 p-4 rounded-2xl text-sm font-medium shadow-sm flex items-start gap-3 text-left animate-slide-up">
                   <i className="fa-solid fa-triangle-exclamation text-xl shrink-0 mt-0.5"></i><p>{fbError}</p>
                 </div>
              )}

              <div className="relative z-10">
                <div className="w-20 h-20 mx-auto bg-gradient-to-tr from-blue-500 to-pink-500 rounded-3xl shadow-lg flex items-center justify-center mb-6 transform rotate-12 hover:rotate-0 transition-transform duration-500">
                  <i className="fa-solid fa-comments text-white text-4xl -rotate-12"></i>
                </div>
                <h1 className="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white mb-2">Welcome Back</h1>
                <p className="text-gray-500 dark:text-gray-400 text-sm font-medium">Select your identity to connect.</p>
              </div>

              <div className="space-y-4 relative z-10">
                <button onClick={() => selectUser('Daksh')} className="w-full py-4 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white rounded-2xl font-bold transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 text-lg">
                  I am Daksh
                </button>
                <button onClick={() => selectUser('Brahmgeet')} className="w-full py-4 bg-pink-500 hover:bg-pink-600 active:bg-pink-700 text-white rounded-2xl font-bold transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 text-lg">
                  I am Brahmgeet
                </button>
              </div>
            </div>
          </div>
        );
      }

      // PRESENCE LOGIC
      let presenceDisplay = "Connecting...";
      let isPartnerOnline = false;
      
      if (otherUserPresence) {
        const timeDiff = Date.now() - otherUserPresence.lastActive;
        const isRecentlyActive = timeDiff < 90000;
        if (otherUserPresence.isOnline && isRecentlyActive) {
          isPartnerOnline = true;
          presenceDisplay = otherUserPresence.isTyping ? "Typing..." : "Online";
        } else {
          isPartnerOnline = false;
          presenceDisplay = otherUserPresence.lastActive ? `Last seen ${getDateLabel(otherUserPresence.lastActive).toLowerCase()} at ${formatTime(otherUserPresence.lastActive)}` : "Offline";
        }
      }

      const groupedMessages = [];
      let lastDateString = null;
      messages.forEach(msg => {
        const msgDate = new Date(msg.timestamp).toDateString();
        if (msgDate !== lastDateString) { groupedMessages.push({ type: 'date', value: msg.timestamp, id: `date-${msg.id}` }); lastDateString = msgDate; }
        groupedMessages.push({ type: 'message', ...msg });
      });

      // MAIN RENDER
      return (
        <div className="min-h-[100dvh] flex items-center justify-center sm:p-4 md:p-6 lg:p-8" onClick={() => { setActiveContextMenu(null); setShowEmojis(false); setShowGifs(false); }}>
          <div className="w-full max-w-5xl h-[100dvh] sm:h-[88vh] md:h-[92vh] flex flex-col overflow-hidden relative shadow-2xl transition-all duration-300 sm:rounded-[2.5rem] bg-white dark:bg-gray-900 border-gray-200 dark:border-gray-800 sm:border">
            
            <div className="absolute inset-0 pointer-events-none z-[60] overflow-hidden">
              {floatingEmojis.map(item => (<div key={item.id} className="animate-float drop-shadow-lg" style={{ left: item.left, fontSize: item.fontSize, animationDuration: item.animationDuration, animationDelay: item.delay }}>{item.emoji}</div>))}
            </div>

            {confirmDialog && <ConfirmModal {...confirmDialog} />}
            <MediaLightbox src={viewingImage} onClose={() => setViewingImage(null)} />

            <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" className="hidden" />
            <input type="file" ref={cameraInputRef} onChange={handleFileChange} accept="image/*" capture="environment" className="hidden" />

            {/* SETTINGS SIDEBAR */}
            {showSettings && (
              <div className="absolute inset-y-0 right-0 w-full sm:w-80 md:w-96 z-50 shadow-2xl flex flex-col transform transition-transform duration-300 bg-gray-50 dark:bg-gray-900 border-l border-gray-200 dark:border-gray-800 animate-slide-up sm:animate-none" onClick={(e) => e.stopPropagation()}>
                <div className="h-16 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-6 shrink-0 bg-white dark:bg-gray-900">
                  <h2 className="font-bold text-lg">Settings</h2>
                  <button onClick={() => setShowSettings(false)} className="w-8 h-8 flex items-center justify-center -mr-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div className="p-6 space-y-8 overflow-y-auto flex-1 custom-scrollbar">
                  <section>
                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 ml-1">Appearance</h3>
                    <div className="bg-white dark:bg-gray-800 rounded-2xl p-2 shadow-sm border border-gray-100 dark:border-gray-700">
                      <div className="flex items-center justify-between p-3 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors cursor-pointer" onClick={toggleTheme}>
                        <div className="flex items-center gap-3">
                          <div className={`w-8 h-8 flex items-center justify-center rounded-lg ${isDarkMode ? 'bg-indigo-500/10 text-indigo-400' : 'bg-amber-500/10 text-amber-500'}`}><i className={`fa-solid ${isDarkMode ? 'fa-moon' : 'fa-sun'} text-lg`}></i></div>
                          <span className="font-semibold text-sm">Dark Mode</span>
                        </div>
                        <div className={`w-12 h-6 rounded-full p-1 transition-colors relative ${isDarkMode ? 'bg-blue-500' : 'bg-gray-200 dark:bg-gray-600'}`}><div className={`w-4 h-4 bg-white rounded-full shadow-sm transition-transform ${isDarkMode ? 'translate-x-6' : 'translate-x-0'}`} /></div>
                      </div>
                    </div>
                  </section>
                  <section>
                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 ml-1">Personalization</h3>
                    <div className="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 space-y-6">
                      <div>
                        <label className="block text-sm font-semibold mb-2">Nickname</label>
                        <input type="text" value={customNickname} onChange={(e) => setCustomNickname(e.target.value)} placeholder={defaultOtherPerson} className="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all text-sm font-medium" />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-3">Accent Color</label>
                        <div className="grid grid-cols-3 gap-2">
                          {THEMES.colors.map(color => (
                            <button key={color.value} onClick={() => setChatColor(color.value)} className={`flex flex-col items-center gap-2 p-3 rounded-xl border-2 transition-all ${chatColor === color.value ? 'border-blue-500 bg-blue-50 dark:bg-blue-500/10' : 'border-transparent hover:bg-gray-50 dark:hover:bg-gray-700'}`}>
                              <div className={`w-8 h-8 rounded-full shadow-sm ${color.class}`} /><span className="text-[11px] font-bold text-gray-600 dark:text-gray-300">{color.name}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-3">Chat Wallpaper</label>
                        <div className="grid grid-cols-2 gap-2">
                          {THEMES.wallpapers.map(wp => (
                            <button key={wp.name} onClick={() => setWallpaper(wp.class)} className={`h-20 rounded-xl border-2 flex items-center justify-center font-bold text-sm transition-all relative overflow-hidden ${wp.class} ${wallpaper === wp.class ? 'border-blue-500 text-blue-500' : 'border-gray-200 dark:border-gray-700 text-gray-500 hover:border-gray-300 dark:hover:border-gray-500'}`}>
                              <div className="absolute inset-0 bg-white/50 dark:bg-black/50 backdrop-blur-[1px]"></div><span className="relative z-10">{wp.name}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  </section>
                  <section>
                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 ml-1">Account & Data</h3>
                    <div className="space-y-2">
                      <button onClick={handleClearHistory} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors font-semibold shadow-sm text-left">
                        <div className="w-8 h-8 flex items-center justify-center bg-red-100 dark:bg-red-500/20 rounded-lg"><i className="fa-solid fa-trash text-sm"></i></div>
                        <div><div className="text-sm">Clear Chat History</div><div className="text-[10px] font-medium opacity-70 text-gray-500">Deletes globally for both</div></div>
                      </button>
                      <button onClick={() => { setConfirmDialog({ title: "Sign Out", message: "You will return to the identity selection screen.", confirmText: "Sign Out", isDanger: true, onConfirm: () => { setCurrentUser(null); window.localStorage.removeItem('chat_identity'); setConfirmDialog(null); }, onCancel: () => setConfirmDialog(null) }) }} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors font-semibold shadow-sm text-left">
                        <div className="w-8 h-8 flex items-center justify-center bg-gray-100 dark:bg-gray-700 rounded-lg"><i className="fa-solid fa-right-from-bracket text-sm"></i></div><span className="text-sm">Sign Out Device</span>
                      </button>
                    </div>
                  </section>
                </div>
              </div>
            )}

            {/* PROFILE SIDEBAR */}
            {showProfile && (
              <div className="absolute inset-y-0 right-0 w-full sm:w-80 md:w-96 z-40 shadow-2xl flex flex-col transform transition-transform duration-300 bg-white dark:bg-gray-900 border-l border-gray-200 dark:border-gray-800">
                <div className="h-16 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-6 shrink-0 relative z-10">
                  <h2 className="font-bold text-lg">Profile info</h2>
                  <button onClick={() => setShowProfile(false)} className="w-8 h-8 flex items-center justify-center -mr-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors"><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div className="flex flex-col items-center justify-center p-10 border-b border-gray-100 dark:border-gray-800 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-gray-100 dark:from-gray-800 to-transparent opacity-50"></div>
                  <Avatar name={displayOtherPerson} size="xl" colorClass={avatarColorClass} />
                  <h2 className="text-3xl font-extrabold mt-6 mb-1 relative z-10">{displayOtherPerson}</h2>
                  <p className={`text-sm font-semibold relative z-10 ${isPartnerOnline ? 'text-green-500' : 'text-gray-500'}`}>{presenceDisplay}</p>
                </div>
              </div>
            )}

            {/* HEADER (Clean, no fake icons) */}
            <header className="h-[72px] border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-4 sm:px-6 z-20 shrink-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md">
              <div className="flex items-center gap-3 sm:gap-4">
                <button onClick={() => setShowSettings(true)} className="w-10 h-10 flex items-center justify-center -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 sm:hidden transition-colors"><i className="fa-solid fa-bars text-xl"></i></button>
                <button onClick={() => setShowProfile(true)} className="flex items-center gap-3.5 text-left hover:bg-gray-50 dark:hover:bg-gray-800 p-1.5 -ml-1.5 rounded-2xl transition-colors">
                  <Avatar name={displayOtherPerson} isOnline={isPartnerOnline} size="md" colorClass={avatarColorClass} />
                  <div className="flex flex-col">
                    <span className="font-bold text-[16px] leading-none mb-1 text-gray-900 dark:text-white">{displayOtherPerson}</span>
                    <span className={`text-[12px] font-semibold leading-none ${isPartnerOnline && otherUserPresence.isTyping ? 'text-blue-500 animate-pulse' : isPartnerOnline ? 'text-green-500' : 'text-gray-500 dark:text-gray-400'}`}>{presenceDisplay}</span>
                  </div>
                </button>
              </div>
              <div className="flex items-center gap-1 sm:gap-2">
                <button onClick={() => setShowSettings(true)} className="w-10 h-10 flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full hidden sm:block text-gray-500 dark:text-gray-400"><i className="fa-solid fa-gear text-lg"></i></button>
              </div>
            </header>

            {/* MAIN MESSAGES AREA */}
            <main ref={chatContainerRef} className={`flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 custom-scrollbar relative z-10 bg-cover bg-center bg-fixed ${wallpaper} ${!wallpaper ? (isDarkMode ? 'bg-[#0f1115]' : 'bg-[#f0f2f5]') : ''}`}>
              <div className="flex flex-col items-center justify-center py-12 text-center space-y-4 max-w-md mx-auto">
                <Avatar name={displayOtherPerson} size="lg" colorClass={avatarColorClass} />
                <h2 className="text-2xl font-extrabold text-gray-900 dark:text-white px-4 py-1 rounded-xl">{displayOtherPerson}</h2>
                <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-200/50 dark:bg-gray-800/80 px-4 py-2 rounded-full backdrop-blur-md shadow-sm border border-gray-300/30 dark:border-gray-700/50"><i className="fa-solid fa-lock mr-1.5 align-middle text-amber-500"></i>Messages are secured with end-to-end sync.</p>
              </div>

              {groupedMessages.map((item, index) => {
                if (item.type === 'date') return (
                  <div key={item.id} className="flex justify-center my-6"><span className="text-[11px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-full bg-gray-200/80 dark:bg-gray-800/80 text-gray-600 dark:text-gray-300 backdrop-blur-md shadow-sm border border-white/20 dark:border-gray-700/50">{getDateLabel(item.value)}</span></div>
                );

                const msg = item;
                const isMe = msg.sender === currentUser;
                const showContext = activeContextMenu === msg.id;
                const prevMsg = index > 0 && groupedMessages[index - 1].type === 'message' ? groupedMessages[index - 1] : null;
                const nextMsg = index < groupedMessages.length - 1 && groupedMessages[index + 1].type === 'message' ? groupedMessages[index + 1] : null;
                const isFirstInGroup = !prevMsg || prevMsg.sender !== msg.sender;
                const isLastInGroup = !nextMsg || nextMsg.sender !== msg.sender;

                const bubbleClass = isMe ? `bg-${chatColor}-500 text-white` : (isDarkMode ? 'bg-[#20232b] text-gray-100 border border-gray-800/50' : 'bg-white text-gray-900 shadow-sm border border-gray-100');
                let radiusClass = 'rounded-2xl';
                if (isMe) { if (!isFirstInGroup) radiusClass += ' rounded-tr-sm'; if (!isLastInGroup) radiusClass += ' rounded-br-sm'; } 
                else { if (!isFirstInGroup) radiusClass += ' rounded-tl-sm'; if (!isLastInGroup) radiusClass += ' rounded-bl-sm'; }

                return (
                  <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} ${!isLastInGroup ? 'mb-0.5' : 'mb-3'}`}>
                    <div className={`flex items-end gap-2 max-w-[85%] sm:max-w-[70%] lg:max-w-[60%] relative group`}>
                      <div className={`opacity-0 group-hover:opacity-100 transition-opacity flex items-center ${isMe ? 'order-1 pr-2' : 'order-2 pl-2'}`}>
                        <button onClick={(e) => { e.stopPropagation(); setActiveContextMenu(showContext ? null : msg.id); }} className="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"><i className="fa-solid fa-ellipsis-vertical text-lg"></i></button>
                      </div>

                      {showContext && (
                        <div className={`absolute ${isLastInGroup ? 'bottom-full mb-2' : 'top-0 mt-8'} ${isMe ? 'right-0' : 'left-0'} z-50 flex flex-col p-1.5 rounded-2xl shadow-2xl border bg-white dark:bg-gray-800 border-gray-100 dark:border-gray-700 animate-zoom-in min-w-[200px]`} onClick={(e) => e.stopPropagation()}>
                          <div className="flex items-center justify-between p-2 bg-gray-50 dark:bg-gray-900/50 rounded-xl mb-1 border border-gray-100 dark:border-gray-700">
                            {EMOJIS.quick.map(emoji => (<button key={emoji} onClick={() => handleReaction(msg.id, emoji, msg.reactions)} className="text-2xl hover:scale-125 transition-transform origin-bottom">{emoji}</button>))}
                          </div>
                          <div className="flex flex-col space-y-0.5 mt-1">
                            <button onClick={() => { setReplyingTo(msg); setActiveContextMenu(null); }} className="w-full flex items-center gap-3 p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-sm font-semibold text-gray-700 dark:text-gray-200 text-left"><i className="fa-solid fa-reply text-gray-400 w-4"></i> Reply</button>
                            {msg.text && <button onClick={() => { navigator.clipboard.writeText(msg.text); setActiveContextMenu(null); }} className="w-full flex items-center gap-3 p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-sm font-semibold text-gray-700 dark:text-gray-200 text-left"><i className="fa-solid fa-copy text-gray-400 w-4"></i> Copy Text</button>}
                            
                            {/* EDIT BUTTON (Only for your own text messages) */}
                            {isMe && msg.text && !msg.audio && !msg.image && (
                              <button onClick={() => { setEditingMessage(msg); setInputText(msg.text); setActiveContextMenu(null); }} className="w-full flex items-center gap-3 p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-sm font-semibold text-gray-700 dark:text-gray-200 text-left"><i className="fa-solid fa-pen text-gray-400 w-4"></i> Edit</button>
                            )}

                            {msg.text && <button onClick={() => handleTextToSpeech(msg.text)} className="w-full flex items-center gap-3 p-2.5 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-sm font-semibold text-gray-700 dark:text-gray-200 text-left"><i className="fa-solid fa-volume-high text-gray-400 w-4"></i> Read Aloud</button>}
                            {isMe && <><div className="h-px bg-gray-100 dark:bg-gray-700 my-1"></div><button onClick={() => handleUnsendMessage(msg.id)} className="w-full flex items-center gap-3 p-2.5 rounded-xl hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors text-sm font-semibold text-red-500 text-left"><i className="fa-solid fa-trash w-4"></i> Unsend</button></>}
                          </div>
                        </div>
                      )}

                      <div className={`flex flex-col px-3.5 py-2.5 text-[15px] relative ${bubbleClass} ${radiusClass} transition-transform active:scale-[0.98] animate-fade-in shadow-sm`} style={{ wordBreak: 'break-word' }} onDoubleClick={() => handleReaction(msg.id, '❤️', msg.reactions)}>
                        {msg.replyTo && (
                          <div className={`mb-2 pl-3 border-l-[3px] text-sm rounded-r-lg py-1.5 px-3 cursor-pointer ${isMe ? 'border-white/70 bg-black/10' : 'border-blue-500 bg-gray-100 dark:bg-gray-700/50'}`} onClick={() => { const target = document.getElementById(`msg-${msg.replyTo.id}`); if (target) { target.scrollIntoView({ behavior: 'smooth', block: 'center' }); target.classList.add('animate-pulse'); setTimeout(() => target.classList.remove('animate-pulse'), 2000); } }}>
                            <div className={`font-bold text-[12px] mb-0.5 ${isMe ? 'text-white' : 'text-blue-500'}`}>{msg.replyTo.sender}</div>
                            <div className="opacity-90 line-clamp-1 leading-tight text-xs flex items-center gap-1.5">{msg.replyTo.hasMedia && <i className="fa-solid fa-image"></i>}{renderTextWithLinks(msg.replyTo.text) || (msg.replyTo.hasMedia ? 'Media' : 'Message')}</div>
                          </div>
                        )}

                        {msg.image && (
                          <div className="relative group/img cursor-zoom-in" onClick={() => setViewingImage(msg.image)}>
                            <img src={msg.image} className={`mb-1 max-w-full rounded-xl object-cover ${msg.text ? '' : 'mb-0'} ${isMe ? 'border border-white/20' : 'border border-gray-200 dark:border-gray-700'}`} style={{ maxHeight: '350px', minHeight: '100px', minWidth: '150px' }} loading="lazy" />
                            <div className="absolute inset-0 bg-black/0 group-hover/img:bg-black/10 transition-colors rounded-xl flex items-center justify-center"><i className="fa-solid fa-expand text-white text-2xl opacity-0 group-hover/img:opacity-100 transition-opacity drop-shadow-md"></i></div>
                          </div>
                        )}

                        {msg.audio && (
                          <div className={`mb-1 mt-1 flex items-center gap-2 p-1.5 rounded-full ${isMe ? 'bg-black/10' : 'bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700'}`}>
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${isMe ? 'bg-white text-blue-500' : 'bg-blue-500 text-white'}`}><i className="fa-solid fa-microphone text-lg"></i></div>
                            <audio controls src={msg.audio} className="h-8 w-40 sm:w-56 outline-none" style={{ filter: isDarkMode && !isMe ? 'invert(0.9) hue-rotate(180deg)' : (isMe ? 'invert(1) hue-rotate(180deg) brightness(1.5)' : 'none') }}></audio>
                          </div>
                        )}
                        
                        {msg.text && <div className="leading-snug whitespace-pre-wrap font-medium">{renderTextWithLinks(msg.text)}</div>}
                        
                        <div className={`text-[10px] mt-1.5 font-bold tracking-wide flex justify-end items-center gap-1 ${isMe ? 'text-white/80' : 'text-gray-400 dark:text-gray-500'}`}>
                          {/* EDITED TAG */}
                          {msg.isEdited && <span className="opacity-70 mr-1 italic font-normal">(edited)</span>}
                          <span>{formatTime(msg.timestamp)}</span>
                          {isMe && (
                            <span className="flex items-center ml-1 mt-px">
                              {msg.status === 'sent' && <i className="fa-solid fa-check text-white/70"></i>}
                              {msg.status === 'delivered' && <i className="fa-solid fa-check-double text-white/90"></i>}
                              {msg.status === 'read' && <i className="fa-solid fa-check-double text-blue-200 drop-shadow-sm"></i>}
                            </span>
                          )}
                        </div>

                        {(msg.reactions && msg.reactions.length > 0) && (
                          <div className={`absolute -bottom-3.5 ${isMe ? 'right-0' : 'left-0'} bg-white dark:bg-gray-800 rounded-full px-2 py-1 shadow-md border border-gray-200 dark:border-gray-700 flex items-center gap-1 text-[12px] animate-zoom-in z-10`}>
                            {Array.from(new Set(msg.reactions)).map(emoji => {
                              const count = msg.reactions.filter(r => r === emoji).length;
                              return <span key={emoji} className="flex items-center gap-0.5">{emoji} {count > 1 && <span className="text-[9px] font-bold text-gray-500">{count}</span>}</span>
                            })}
                          </div>
                        )}
                      </div>
                      <div id={`msg-${msg.id}`} className="absolute top-0"></div>
                    </div>
                  </div>
                );
              })}

              {isPartnerOnline && otherUserPresence.isTyping && (
                <div className="flex items-start mb-2 animate-fade-in">
                  <div className="flex items-end gap-2 max-w-[85%]">
                    <div className="bg-white dark:bg-[#20232b] shadow-sm border border-gray-100 dark:border-gray-800/50 rounded-2xl rounded-bl-sm px-4 py-3.5 flex items-center gap-1.5">
                      <div className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div><div className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div><div className="w-1.5 h-1.5 bg-gray-400 rounded-full typing-dot"></div>
                    </div>
                  </div>
                </div>
              )}
            </main>

            <footer className="p-3 sm:p-4 shrink-0 border-t z-30 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md dark:border-gray-800" onClick={(e) => e.stopPropagation()}>
              
              {/* EDIT BANNER */}
              {editingMessage && (
                <div className="mb-3 px-4 py-2.5 rounded-xl flex items-center justify-between border-l-[4px] border-green-500 shadow-sm bg-green-50/50 dark:bg-gray-800 animate-slide-up">
                  <div className="flex flex-col overflow-hidden pr-4">
                    <span className="text-xs font-bold text-green-500 mb-0.5">Editing Message</span>
                    <span className="text-sm font-medium text-gray-600 dark:text-gray-300 truncate">{editingMessage.text}</span>
                  </div>
                  <button onClick={() => { setEditingMessage(null); setInputText(''); }} className="w-8 h-8 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                </div>
              )}

              {replyingTo && !editingMessage && (
                <div className="mb-3 px-4 py-2.5 rounded-xl flex items-center justify-between border-l-[4px] border-blue-500 shadow-sm bg-gray-50 dark:bg-gray-800 animate-slide-up">
                  <div className="flex flex-col overflow-hidden pr-4">
                    <span className="text-xs font-bold text-blue-500 mb-0.5">Replying to {replyingTo.sender}</span>
                    <span className="text-sm font-medium text-gray-600 dark:text-gray-300 truncate flex items-center gap-1.5">{replyingTo.hasMedia && <i className="fa-solid fa-image text-gray-400"></i>}{replyingTo.text || (replyingTo.hasMedia ? 'Media Attachment' : 'Message')}</span>
                  </div>
                  <button onClick={() => setReplyingTo(null)} className="w-8 h-8 flex items-center justify-center hover:bg-gray-200 dark:hover:bg-gray-700 rounded-full text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                </div>
              )}

              <div className="flex items-end gap-2">
                {!editingMessage && (
                  <div className="relative mb-1 plus-btn-container">
                    <button type="button" className="w-11 h-11 bg-gray-100 dark:bg-gray-800 text-gray-500 hover:text-blue-500 rounded-full transition-colors flex items-center justify-center shrink-0" title="Add Media"><i className="fa-solid fa-plus text-lg"></i></button>
                    <div className="absolute bottom-full left-0 mb-2 flex-col gap-2 p-2 bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 hover-group origin-bottom-left transition-all z-50">
                      <button type="button" onClick={() => cameraInputRef.current?.click()} className="flex items-center gap-3 p-2 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl text-sm font-semibold whitespace-nowrap"><i className="fa-solid fa-camera text-blue-500 text-lg w-5"></i> Take Photo</button>
                      <button type="button" onClick={() => fileInputRef.current?.click()} className="flex items-center gap-3 p-2 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl text-sm font-semibold whitespace-nowrap"><i className="fa-solid fa-image text-purple-500 text-lg w-5"></i> Photo Library</button>
                    </div>
                  </div>
                )}

                <form onSubmit={(e) => handleSendMessage({ e })} className={`flex-1 flex items-end gap-1 rounded-3xl border shadow-sm transition-colors ${isDarkMode ? 'bg-gray-800 border-gray-700 focus-within:border-gray-600' : 'bg-gray-50 border-gray-200 focus-within:border-gray-300'}`}>
                  {isRecording ? (
                    <div className="flex-1 flex items-center justify-between px-4 min-h-[52px]">
                      <div className="flex items-center gap-3">
                        <div className="relative flex items-center justify-center"><div className="w-3 h-3 bg-red-500 rounded-full relative z-10"></div><div className="w-3 h-3 bg-red-500 rounded-full absolute recording-pulse"></div></div>
                        <span className="text-red-500 font-bold font-mono tracking-wider">00:{recordingTime < 10 ? `0${recordingTime}` : recordingTime}</span>
                        <span className="text-[10px] text-gray-400 uppercase font-bold tracking-widest ml-2 animate-pulse">Recording</span>
                      </div>
                      <button type="button" onClick={cancelRecording} className="text-sm font-bold text-gray-400 hover:text-red-500 transition-colors px-2 py-1">Cancel</button>
                    </div>
                  ) : (
                    <>
                      <div className="flex items-center gap-1 pl-1 pb-1.5 shrink-0">
                        <div className="relative">
                          <button type="button" onClick={() => { setShowEmojis(false); setShowGifs(!showGifs); }} className={`w-10 h-10 rounded-full transition-colors flex items-center justify-center ${showGifs ? 'text-blue-500 bg-blue-50 dark:bg-blue-500/10' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`}><div className="border-[2.5px] border-current rounded-md px-1 py-0.5 text-[9px] font-black leading-none tracking-widest uppercase">GIF</div></button>
                          {showGifs && (
                            <div className="absolute bottom-14 left-0 shadow-2xl rounded-2xl p-2 w-80 h-[22rem] flex flex-col gap-2 z-[70] border bg-white dark:bg-gray-800 border-gray-100 dark:border-gray-700 animate-slide-up origin-bottom-left">
                              <div className="flex items-center gap-2 px-3 py-2.5 rounded-xl border bg-gray-50 dark:bg-gray-900 border-gray-200 dark:border-gray-700 focus-within:border-blue-500 transition-colors">
                                <i className="fa-solid fa-magnifying-glass text-gray-400"></i>
                                <input type="text" placeholder="Search Tenor..." value={gifSearchTerm} onChange={(e) => setGifSearchTerm(e.target.value)} className="bg-transparent border-none outline-none w-full text-sm font-medium" autoFocus />
                              </div>
                              <div className="flex-1 overflow-y-auto grid grid-cols-2 gap-2 pr-1 custom-scrollbar">
                                {isSearchingGifs ? <div className="col-span-2 flex justify-center items-center h-full text-gray-400"><i className="fa-solid fa-spinner animate-spin text-3xl"></i></div> : tenorGifs.map((gifUrl, index) => (
                                  <button key={index} type="button" onClick={() => handleSendMessage({ imageUrl: gifUrl })} className="rounded-xl overflow-hidden h-28 relative group bg-gray-100 dark:bg-gray-900"><img src={gifUrl} className="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110" loading="lazy" /></button>
                                ))}
                              </div>
                            </div>
                          )}
                        </div>
                        <div className="relative">
                          <button type="button" onClick={() => { setShowGifs(false); setShowEmojis(!showEmojis); }} className={`w-10 h-10 rounded-full transition-colors flex items-center justify-center ${showEmojis ? 'text-blue-500 bg-blue-50 dark:bg-blue-500/10' : 'text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`}><i className="fa-solid fa-face-smile text-xl"></i></button>
                          {showEmojis && (
                            <div className="absolute bottom-14 left-0 shadow-2xl rounded-2xl p-3 grid grid-cols-6 gap-1 w-72 max-h-64 overflow-y-auto z-[70] border custom-scrollbar bg-white dark:bg-gray-800 border-gray-100 dark:border-gray-700 animate-slide-up origin-bottom-left">
                              {EMOJIS.common.map((emoji, idx) => (<button key={idx} type="button" onClick={() => setInputText(prev => prev + emoji)} className="text-2xl rounded-xl p-2 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors flex items-center justify-center">{emoji}</button>))}
                            </div>
                          )}
                        </div>
                      </div>
                      <textarea value={inputText} onChange={handleInputChange} placeholder={editingMessage ? "Edit message..." : "Message..."} className="flex-1 bg-transparent border-none text-[15px] font-medium px-2 py-3.5 outline-none min-w-0 resize-none max-h-32 custom-scrollbar placeholder-gray-400" rows="1" style={{ minHeight: '52px' }} onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = `${Math.min(e.target.scrollHeight, 128)}px`; }} onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage({ e }); e.target.style.height = 'auto'; } }} />
                    </>
                  )}
                  
                  <div className="pl-1 pr-2 pb-1.5 shrink-0 flex items-center">
                    {!inputText.trim() && !isRecording && !editingMessage ? (
                      <button type="button" onClick={startRecording} className="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-blue-500 transition-colors rounded-full" title="Hold to Record"><i className="fa-solid fa-microphone text-xl"></i></button>
                    ) : isRecording ? (
                      <button type="button" onClick={stopRecording} className="w-10 h-10 flex items-center justify-center bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95"><i className="fa-solid fa-paper-plane text-sm -ml-0.5"></i></button>
                    ) : (
                      <button type="submit" className={`w-10 h-10 flex items-center justify-center rounded-full shadow-md transition-all hover:scale-105 active:scale-95 ${editingMessage ? 'bg-green-500 text-white' : chatColor === 'blue' ? 'bg-blue-500 text-white' : chatColor === 'pink' ? 'bg-pink-500 text-white' : 'bg-gray-900 dark:bg-white text-white dark:text-gray-900'}`}>
                        {editingMessage ? <i className="fa-solid fa-check text-lg"></i> : <i className="fa-solid fa-paper-plane text-sm -ml-0.5"></i>}
                      </button>
                    )}
                  </div>
                </form>
              </div>
            </footer>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
